            GET /works/{workId}/overlay（也见响应 liveUserStateFields）。
        progress:
          type: number
          minimum: 0
          maximum: 1
          description: 语义同 favorite：本字段是 snapshot 值，不是 live 值。
        matches:
          type: array
          description: 仅在请求携带非空 q 时可能出现；无搜索词时不返回伪相关性命中
          items:
            $ref: "#/components/schemas/FieldMatch"
