    Job:
      type: object
      additionalProperties: false
      required: [id, type, status, stage, progress, attempt, createdAt, updatedAt]
      properties:
        id:
          $ref: "#/components/schemas/JobId"
        type:
          type: string
          enum: [scan, hash, overlay_projection, derived, external_tool, control_backup, control_restore, catalog_gc, catalog_checkpoint, catalog_vacuum, derived_gc]
        sourceId:
          $ref: "#/components/schemas/SourceId"
        status:
          type: string
          enum: [queued, running, publishing, cancelling, completed, failed, cancelled, superseded, needs_repair]
        stage:
          type: string
        progress:
          type: object
          additionalProperties: false
          required: [current, total, sequence]
          properties:
            current:
              type: integer
              format: int64
              minimum: 0
            total:
              type: integer
              format: int64
              minimum: 0
            sequence:
              type: integer
              format: int64
              minimum: 1
            phase:
              type: string
            unit:
              type: string
            message:
              type: string
            bytes:
              type: integer
              format: int64
              minimum: 0
            entities:
              type: integer
              format: int64
              minimum: 0
            estimated:
              type: boolean
        issueCode:
          type: string
          nullable: true
        queryPublicationId:
          allOf:
            - $ref: "#/components/schemas/QueryPublicationId"
          nullable: true
        retryOf:
          allOf:
            - $ref: "#/components/schemas/JobId"
          nullable: true
          description: v18 及更早历史子 Job 的兼容来源；新 retry 不再写入
        attempt:
          type: integer
          minimum: 1
        createdAt:
          type: string
          format: date-time
        startedAt:
          type: string
          format: date-time
          nullable: true
        finishedAt:
          type: string
          format: date-time
          nullable: true
        updatedAt:
          type: string
          format: date-time
        ruleSemanticHash:
          $ref: "#/components/schemas/SHA256Digest"
        ruleParametersHash:
          $ref: "#/components/schemas/SHA256Digest"
        ruleIrHash:
          $ref: "#/components/schemas/SHA256Digest"
        compilerVersion:
          type: string
        celProfileVersion:
          type: string
        extensionRegistryVersion:
          type: string
        resourceClass:
          type: string
        targetResource:
          type: string
        failureRetryable:
          type: boolean
        cancelRequested:
          type: boolean
        nextAttemptAt:
          type: string
          format: date-time
          nullable: true
        scanProfile:
          type: string
          enum: [index, incremental, verify]
          description: 仅 scan 类型 Job 有效；index 不确认内容、incremental 按既往观察复用已确认摘要、verify 强制重新完整哈希
        derivedAssetKey:
          type: string
          pattern: "^[0-9a-f]{64}$"
          description: 仅 derived 类型且已 completed 的 Job 有效；配合 GET /derived-assets/{assetKey}/content 读取正文

