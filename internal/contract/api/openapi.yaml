openapi: 3.0.3
info:
  title: Gallery API
  version: 0.5.0-pre-alpha
  description: Gallery pre-alpha 契约（阶段 3 扫描、任务和 Catalog 正确性切片）；资源面随阶段演进为兼容基线，物理 Schema 与完整 v1 语义尚未冻结。
servers:
  - url: http://127.0.0.1:{port}
    variables:
      port:
        default: "8080"
paths:
  /api/v1/health:
    get:
      operationId: getHealth
      summary: 读取服务与两库健康状态
      security: []
      responses:
        "200":
          description: 服务可用
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthResponse"
        "500":
          $ref: "#/components/responses/InternalError"
  /api/v1/bootstrap:
    get:
      operationId: getBootstrap
      summary: 读取部署模式、协议版本和当前主体能力
      security: []
      responses:
        "200":
          description: Bootstrap snapshot
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BootstrapResponse"
        "500":
          $ref: "#/components/responses/InternalError"
  /api/v1/personal/pairing-attempts:
    post:
      operationId: createPairingAttempt
      summary: 创建短时、单次使用的 Personal 配对凭据
      security: []
      parameters:
        - $ref: "#/components/parameters/CSRFHeader"
      responses:
        "201":
          description: 配对凭据已创建；凭据只在本响应出现
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PairingAttemptResponse"
        "403":
          $ref: "#/components/responses/ForbiddenError"
  /api/v1/personal/pair:
    post:
      operationId: exchangePairingCredential
      summary: 单次消费配对凭据并建立 HttpOnly Session
      security: []
      parameters:
        - $ref: "#/components/parameters/CSRFHeader"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PairingExchangeRequest"
      responses:
        "201":
          description: Session 已建立
          headers:
            Set-Cookie:
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SessionEstablishedResponse"
        "401":
          $ref: "#/components/responses/UnauthenticatedError"
        "403":
          $ref: "#/components/responses/ForbiddenError"
  /api/v1/sessions:
    get:
      operationId: listSessions
      summary: 列出服务端 Session
      responses:
        "200":
          description: Session 列表
          content:
            application/json:
              schema:
                type: object
                additionalProperties: false
                required: [sessions]
                properties:
                  sessions:
                    type: array
                    items:
                      $ref: "#/components/schemas/SessionSummary"
        "401":
          $ref: "#/components/responses/UnauthenticatedError"
        "403":
          $ref: "#/components/responses/ForbiddenError"
  /api/v1/sessions/{sessionId}:
    delete:
      operationId: revokeSession
      summary: 吊销指定 Session
      parameters:
        - name: sessionId
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/SessionId"
        - $ref: "#/components/parameters/CSRFHeader"
      responses:
        "204":
          description: Session 已吊销
        "401":
          $ref: "#/components/responses/UnauthenticatedError"
        "403":
          $ref: "#/components/responses/ForbiddenError"
        "404":
          $ref: "#/components/responses/NotFoundError"
  /api/v1/libraries:
    post:
      operationId: createLibrary
      summary: 创建 Library
      parameters:
        - $ref: "#/components/parameters/CSRFHeader"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LibraryCreateRequest"
      responses:
        "201":
          description: Library 已创建
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Library"
        "400":
          $ref: "#/components/responses/ValidationError"
        "401":
          $ref: "#/components/responses/UnauthenticatedError"
        "403":
          $ref: "#/components/responses/ForbiddenError"
  /api/v1/libraries/{libraryId}:
    get:
      operationId: getLibrary
      summary: 读取 Library
      parameters:
        - name: libraryId
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/LibraryId"
      responses:
        "200":
          description: Library
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Library"
        "401":
          $ref: "#/components/responses/UnauthenticatedError"
        "403":
          $ref: "#/components/responses/ForbiddenError"
        "404":
          $ref: "#/components/responses/NotFoundError"
  /api/v1/sources:
    post:
      operationId: createSource
      summary: 注册严格只读 Source
      parameters:
        - $ref: "#/components/parameters/CSRFHeader"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SourceCreateRequest"
      responses:
        "201":
          description: Source 已注册
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Source"
        "400":
          $ref: "#/components/responses/ValidationError"
        "401":
          $ref: "#/components/responses/UnauthenticatedError"
        "403":
          $ref: "#/components/responses/ForbiddenError"
        "409":
          $ref: "#/components/responses/ConflictError"
  /api/v1/sources/{sourceId}:
    get:
      operationId: getSource
      summary: 读取不含绝对路径的 Source snapshot
      parameters:
        - name: sourceId
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/SourceId"
      responses:
        "200":
          description: Source
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Source"
        "401":
          $ref: "#/components/responses/UnauthenticatedError"
        "403":
          $ref: "#/components/responses/ForbiddenError"
        "404":
          $ref: "#/components/responses/NotFoundError"
  /api/v1/rules/validate:
    post:
      operationId: validateRulePackage
      summary: 实例化默认值、规范化并校验规则包
      parameters:
        - $ref: "#/components/parameters/CSRFHeader"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RuleValidateRequest"
      responses:
        "200":
          description: 规则包规范化和身份结果
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RuleValidationResult"
        "400": {$ref: "#/components/responses/ValidationError"}
        "401": {$ref: "#/components/responses/UnauthenticatedError"}
        "403": {$ref: "#/components/responses/ForbiddenError"}
  /api/v1/rules/schema:
    get:
      operationId: getRulePackageSchema
      summary: 读取规则包 JSON Schema 与表单元数据契约
      responses:
        "200":
          description: 规则包 Schema
          content:
            application/schema+json:
              schema:
                type: object
                additionalProperties: true
        "401": {$ref: "#/components/responses/UnauthenticatedError"}
        "403": {$ref: "#/components/responses/ForbiddenError"}
  /api/v1/rules/compile:
    post:
      operationId: compileRulePackage
      summary: 编译冻结参数的 Rule IR
      parameters:
        - $ref: "#/components/parameters/CSRFHeader"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RuleCompileRequest"
      responses:
        "200":
          description: 编译结果和缓存命中状态
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RuleCompileResult"
        "400": {$ref: "#/components/responses/ValidationError"}
        "401": {$ref: "#/components/responses/UnauthenticatedError"}
        "403": {$ref: "#/components/responses/ForbiddenError"}
  /api/v1/rules/dry-run:
    post:
      operationId: dryRunRulePackage
      summary: 对显式合成输入执行规则并返回脱敏 Trace
      parameters:
        - $ref: "#/components/parameters/CSRFHeader"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RuleDryRunRequest"
      responses:
        "200":
          description: Dry Run 结果
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RuleDryRunResult"
        "400": {$ref: "#/components/responses/ValidationError"}
        "401": {$ref: "#/components/responses/UnauthenticatedError"}
        "403": {$ref: "#/components/responses/ForbiddenError"}
  /api/v1/rules/impact:
    post:
      operationId: analyzeRuleImpact
      summary: 静态比较两个规则包的重扫、投影、搜索和派生影响
      parameters:
        - $ref: "#/components/parameters/CSRFHeader"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RuleImpactRequest"
      responses:
        "200":
          description: RuleImpact
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RuleImpactResult"
        "400": {$ref: "#/components/responses/ValidationError"}
        "401": {$ref: "#/components/responses/UnauthenticatedError"}
        "403": {$ref: "#/components/responses/ForbiddenError"}
  /api/v1/rules/import:
    post:
      operationId: importRulePackage
      summary: 将 JSON、YAML 或 TOML 导入同一份规范 JSON
      parameters:
        - $ref: "#/components/parameters/CSRFHeader"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RuleImportRequest"
      responses:
        "200":
          description: 导入结果
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RuleImportResult"
        "400": {$ref: "#/components/responses/ValidationError"}
        "401": {$ref: "#/components/responses/UnauthenticatedError"}
        "403": {$ref: "#/components/responses/ForbiddenError"}
  /api/v1/rules/diff:
    post:
      operationId: diffRulePackages
      summary: 返回规则包结构化 diff 与影响分类
      parameters:
        - $ref: "#/components/parameters/CSRFHeader"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RulePackageDiffRequest"
      responses:
        "200":
          description: RuleVersion diff
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RuleVersionDiff"
        "400": {$ref: "#/components/responses/ValidationError"}
        "401": {$ref: "#/components/responses/UnauthenticatedError"}
        "403": {$ref: "#/components/responses/ForbiddenError"}
  /api/v1/rules/explain:
    post:
      operationId: explainRulePackage
      summary: 对合成输入解释字段来源与候选决策
      parameters:
        - $ref: "#/components/parameters/CSRFHeader"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RuleDebugRequest"
      responses:
        "200":
          description: Explain 结果
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RuleExplainResult"
        "400": {$ref: "#/components/responses/ValidationError"}
        "401": {$ref: "#/components/responses/UnauthenticatedError"}
        "403": {$ref: "#/components/responses/ForbiddenError"}
  /api/v1/rules/trace:
    post:
      operationId: traceRulePackage
      summary: 对合成输入返回脱敏 Trace
      parameters:
        - $ref: "#/components/parameters/CSRFHeader"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RuleDebugRequest"
      responses:
        "200":
          description: Trace 结果
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
        "400": {$ref: "#/components/responses/ValidationError"}
        "401": {$ref: "#/components/responses/UnauthenticatedError"}
        "403": {$ref: "#/components/responses/ForbiddenError"}
  /api/v1/rules/examples:
    get:
      operationId: listRuleExamples
      summary: 列出仓库内置的脱敏规则示例
      responses:
        "200":
          description: 内置规则示例
          content:
            application/json:
              schema:
                type: object
                additionalProperties: false
                required: [items]
                properties:
                  items: {type: array, items: {$ref: "#/components/schemas/RuleExample"}}
        "401": {$ref: "#/components/responses/UnauthenticatedError"}
        "403": {$ref: "#/components/responses/ForbiddenError"}
  /api/v1/rules/examples/{exampleId}/test:
    post:
      operationId: testRuleExample
      summary: 执行一个内置规则示例的受限 Dry Run
      parameters:
        - name: exampleId
          in: path
          required: true
          schema: {type: string, pattern: "^[a-z0-9-]+$"}
        - $ref: "#/components/parameters/CSRFHeader"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RuleExampleTestRequest"
      responses:
        "200":
          description: 示例执行结果
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RuleExampleTestResult"
        "400": {$ref: "#/components/responses/ValidationError"}
        "401": {$ref: "#/components/responses/UnauthenticatedError"}
        "403": {$ref: "#/components/responses/ForbiddenError"}
        "404": {$ref: "#/components/responses/NotFoundError"}
  /api/v1/rule-packages:
    get:
      operationId: listRulePackages
      summary: 列出规则包
      responses:
        "200":
          description: 规则包列表
          content:
            application/json:
              schema:
                type: object
                additionalProperties: false
                required: [items]
                properties:
                  items:
                    type: array
                    items: {$ref: "#/components/schemas/RulePackage"}
        "401": {$ref: "#/components/responses/UnauthenticatedError"}
        "403": {$ref: "#/components/responses/ForbiddenError"}
    post:
      operationId: createRulePackage
      summary: 创建规则包
      parameters:
        - $ref: "#/components/parameters/CSRFHeader"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RulePackageCreateRequest"
      responses:
        "201":
          description: 规则包已创建
          content:
            application/json:
              schema: {$ref: "#/components/schemas/RulePackage"}
        "400": {$ref: "#/components/responses/ValidationError"}
        "401": {$ref: "#/components/responses/UnauthenticatedError"}
        "403": {$ref: "#/components/responses/ForbiddenError"}
        "409": {$ref: "#/components/responses/ConflictError"}
  /api/v1/rule-packages/{packageId}:
    get:
      operationId: getRulePackage
      summary: 读取规则包
      parameters:
        - name: packageId
          in: path
          required: true
          schema: {$ref: "#/components/schemas/RulePackageId"}
      responses:
        "200":
          description: 规则包
          content:
            application/json:
              schema: {$ref: "#/components/schemas/RulePackage"}
        "401": {$ref: "#/components/responses/UnauthenticatedError"}
        "403": {$ref: "#/components/responses/ForbiddenError"}
        "404": {$ref: "#/components/responses/NotFoundError"}
  /api/v1/rule-packages/{packageId}/draft:
    get:
      operationId: getRuleDraft
      summary: 读取规则包草稿
      parameters:
        - name: packageId
          in: path
          required: true
          schema: {$ref: "#/components/schemas/RulePackageId"}
      responses:
        "200":
          description: 草稿
          content:
            application/json:
              schema: {$ref: "#/components/schemas/RuleDraft"}
        "401": {$ref: "#/components/responses/UnauthenticatedError"}
        "403": {$ref: "#/components/responses/ForbiddenError"}
        "404": {$ref: "#/components/responses/NotFoundError"}
    put:
      operationId: saveRuleDraft
      summary: 按 revision 保存规则包草稿
      parameters:
        - name: packageId
          in: path
          required: true
          schema: {$ref: "#/components/schemas/RulePackageId"}
        - $ref: "#/components/parameters/CSRFHeader"
        - $ref: "#/components/parameters/IfMatch"
      requestBody:
        required: true
        content:
          application/json:
            schema: {$ref: "#/components/schemas/RuleDraftSaveRequest"}
      responses:
        "200":
          description: 草稿已保存
          content:
            application/json:
              schema: {$ref: "#/components/schemas/RuleDraft"}
        "400": {$ref: "#/components/responses/ValidationError"}
        "401": {$ref: "#/components/responses/UnauthenticatedError"}
        "403": {$ref: "#/components/responses/ForbiddenError"}
        "409": {$ref: "#/components/responses/ConflictError"}
  /api/v1/rule-packages/{packageId}/draft/validate:
    post:
      operationId: validateRuleDraft
      summary: 校验并更新草稿诊断
      parameters:
        - name: packageId
          in: path
          required: true
          schema: {$ref: "#/components/schemas/RulePackageId"}
        - $ref: "#/components/parameters/CSRFHeader"
        - $ref: "#/components/parameters/IfMatch"
      responses:
        "200":
          description: 校验结果
          content:
            application/json:
              schema: {$ref: "#/components/schemas/RuleDraftValidationResult"}
        "400": {$ref: "#/components/responses/ValidationError"}
        "401": {$ref: "#/components/responses/UnauthenticatedError"}
        "403": {$ref: "#/components/responses/ForbiddenError"}
        "409": {$ref: "#/components/responses/ConflictError"}
  /api/v1/rule-packages/{packageId}/publish:
    post:
      operationId: publishRuleDraft
      summary: 将已验证草稿发布为不可变 RuleVersion
      parameters:
        - name: packageId
          in: path
          required: true
          schema: {$ref: "#/components/schemas/RulePackageId"}
        - $ref: "#/components/parameters/CSRFHeader"
        - $ref: "#/components/parameters/IfMatch"
      requestBody:
        required: false
        content:
          application/json:
            schema: {$ref: "#/components/schemas/RulePublishRequest"}
      responses:
        "201":
          description: RuleVersion 已发布
          content:
            application/json:
              schema: {$ref: "#/components/schemas/RuleVersion"}
        "400": {$ref: "#/components/responses/ValidationError"}
        "401": {$ref: "#/components/responses/UnauthenticatedError"}
        "403": {$ref: "#/components/responses/ForbiddenError"}
        "409": {$ref: "#/components/responses/ConflictError"}
  /api/v1/rule-packages/{packageId}/deprecate:
    post:
      operationId: deprecateRulePackage
      summary: 弃用规则包
      parameters:
        - name: packageId
          in: path
          required: true
          schema: {$ref: "#/components/schemas/RulePackageId"}
        - $ref: "#/components/parameters/CSRFHeader"
        - $ref: "#/components/parameters/IfMatch"
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              additionalProperties: false
              properties:
                reason: {type: string, maxLength: 4096}
      responses:
        "200":
          description: 规则包已弃用
          content:
            application/json:
              schema: {$ref: "#/components/schemas/RulePackage"}
        "401": {$ref: "#/components/responses/UnauthenticatedError"}
        "403": {$ref: "#/components/responses/ForbiddenError"}
        "404": {$ref: "#/components/responses/NotFoundError"}
    delete:
      operationId: deleteRulePackage
      summary: 软删除没有已发布版本的规则包
      parameters:
        - name: packageId
          in: path
          required: true
          schema: {$ref: "#/components/schemas/RulePackageId"}
        - $ref: "#/components/parameters/CSRFHeader"
        - $ref: "#/components/parameters/IfMatch"
      responses:
        "200":
          description: 规则包已软删除
          content:
            application/json:
              schema: {$ref: "#/components/schemas/RulePackage"}
        "401": {$ref: "#/components/responses/UnauthenticatedError"}
        "403": {$ref: "#/components/responses/ForbiddenError"}
        "404": {$ref: "#/components/responses/NotFoundError"}
        "409": {$ref: "#/components/responses/ConflictError"}
  /api/v1/rule-packages/{packageId}/audits:
    get:
      operationId: listRuleAudits
      summary: 读取规则包发布、回滚和状态审计
      parameters:
        - name: packageId
          in: path
          required: true
          schema: {$ref: "#/components/schemas/RulePackageId"}
      responses:
        "200":
          description: 审计列表
          content:
            application/json:
              schema:
                type: object
                additionalProperties: false
                required: [items]
                properties:
                  items:
                    type: array
                    items: {type: object, additionalProperties: true}
        "401": {$ref: "#/components/responses/UnauthenticatedError"}
        "403": {$ref: "#/components/responses/ForbiddenError"}
        "404": {$ref: "#/components/responses/NotFoundError"}
  /api/v1/rule-packages/{packageId}/versions:
    get:
      operationId: listRuleVersions
      summary: 列出规则包的不可变版本
      parameters:
        - name: packageId
          in: path
          required: true
          schema: {$ref: "#/components/schemas/RulePackageId"}
        - name: status
          in: query
          required: false
          schema: {type: string}
      responses:
        "200":
          description: 版本列表
          content:
            application/json:
              schema:
                type: object
                additionalProperties: false
                required: [items]
                properties:
                  items:
                    type: array
                    items: {$ref: "#/components/schemas/RuleVersion"}
        "401": {$ref: "#/components/responses/UnauthenticatedError"}
        "403": {$ref: "#/components/responses/ForbiddenError"}
        "404": {$ref: "#/components/responses/NotFoundError"}
  /api/v1/rule-packages/{packageId}/rollback:
    post:
      operationId: rollbackRulePackage
      summary: 按影响确认将当前指针回滚到既有版本
      parameters:
        - name: packageId
          in: path
          required: true
          schema: {$ref: "#/components/schemas/RulePackageId"}
        - $ref: "#/components/parameters/CSRFHeader"
        - $ref: "#/components/parameters/IfMatch"
      requestBody:
        required: true
        content:
          application/json:
            schema: {$ref: "#/components/schemas/RuleRollbackRequest"}
      responses:
        "200":
          description: 当前版本指针已回滚
          content:
            application/json:
              schema: {$ref: "#/components/schemas/RuleVersion"}
        "400": {$ref: "#/components/responses/ValidationError"}
        "401": {$ref: "#/components/responses/UnauthenticatedError"}
        "403": {$ref: "#/components/responses/ForbiddenError"}
        "409": {$ref: "#/components/responses/ConflictError"}
  /api/v1/rule-versions:
    post:
      operationId: createRuleVersion
      summary: 校验、规范化并编译不可变 RuleVersion
      parameters:
        - $ref: "#/components/parameters/CSRFHeader"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RuleVersionCreateRequest"
      responses:
        "201":
          description: RuleVersion 已创建或按 semantic hash 复用
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RuleVersion"
        "400":
          $ref: "#/components/responses/ValidationError"
        "401":
          $ref: "#/components/responses/UnauthenticatedError"
        "403":
          $ref: "#/components/responses/ForbiddenError"
        "409":
          $ref: "#/components/responses/ConflictError"
  /api/v1/rule-versions/{semanticHash}:
    get:
      operationId: getRuleVersion
