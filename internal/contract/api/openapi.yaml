      responses:
        "200":
          description: 合并记录
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreatorMergeListResponse"
        "401":
          $ref: "#/components/responses/UnauthenticatedError"
        "403":
          $ref: "#/components/responses/ForbiddenError"
    post:
      operationId: mergeCreators
      summary: 将若干 CanonicalCreator 合并进一个 target 并排队查询投影
      parameters:
        - $ref: "#/components/parameters/CSRFHeader"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreatorMergeRequest"
      responses:
        "201":
          description: 合并已记录；projectionJobId 表明查询投影进度
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreatorMerge"
        "400":
          $ref: "#/components/responses/ValidationError"
        "401":
          $ref: "#/components/responses/UnauthenticatedError"
        "403":
          $ref: "#/components/responses/ForbiddenError"
        "404":
          $ref: "#/components/responses/NotFoundError"
        "409":
          $ref: "#/components/responses/ConflictError"
  /api/v1/creators/merges/{mergeId}:
    delete:
      operationId: undoCreatorMerge
      summary: 撤销一次创作者合并并排队查询投影恢复
      parameters:
