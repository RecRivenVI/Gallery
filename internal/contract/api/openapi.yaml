openapi: 3.0.3
info:
  title: Gallery API
  version: 0.6.0-pre-alpha
  description: Gallery pre-alpha 契约（阶段 5 账户、安全和多客户端正确性切片）；资源面随阶段演进为兼容基线，物理 Schema 与完整 v1 语义尚未冻结。
servers:
  - url: http://127.0.0.1:{port}
    variables:
      port:
        default: "8080"
paths:
  /api/v1/health:
    get:
      operationId: getHealth
      summary: 读取服务与两库健康状态
      security: []
      responses:
        "200":
          description: 服务可用
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthResponse"
        "500":
          $ref: "#/components/responses/InternalError"
  /api/v1/bootstrap:
    get:
      operationId: getBootstrap
      summary: 读取部署模式、协议版本和当前主体能力
      security: []
      responses:
        "200":
          description: Bootstrap snapshot
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BootstrapResponse"
        "500":
          $ref: "#/components/responses/InternalError"
  /api/v1/personal/pairing-attempts:
    post:
      operationId: createPairingAttempt
      summary: 创建短时、单次使用的 Personal 配对凭据
      security: []
      parameters:
        - $ref: "#/components/parameters/CSRFHeader"
      responses:
        "201":
          description: 配对凭据已创建；凭据只在本响应出现
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PairingAttemptResponse"
        "403":
          $ref: "#/components/responses/ForbiddenError"
  /api/v1/personal/pair:
    post:
      operationId: exchangePairingCredential
      summary: 单次消费配对凭据并建立 HttpOnly Session
      security: []
      parameters:
        - $ref: "#/components/parameters/CSRFHeader"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PairingExchangeRequest"
      responses:
        "201":
          description: Session 已建立
          headers:
            Set-Cookie:
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SessionEstablishedResponse"
        "401":
          $ref: "#/components/responses/UnauthenticatedError"
        "403":
          $ref: "#/components/responses/ForbiddenError"
  /api/v1/lan/owner:
    post:
      operationId: initializeLANOwner
      summary: 首次、原子初始化 LAN Owner；仅允许本机请求
      security: []
      parameters:
        - $ref: "#/components/parameters/CSRFHeader"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LANOwnerInitializeRequest"
      responses:
        "201":
          description: LAN Owner 已初始化
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LocalUser"
        "403":
          $ref: "#/components/responses/ForbiddenError"
        "409":
          $ref: "#/components/responses/ConflictError"
  /api/v1/auth/login:
    post:
      operationId: login
      summary: 使用 LAN 本地账户建立 HttpOnly Session
      security: []
      parameters:
        - $ref: "#/components/parameters/CSRFHeader"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
      responses:
        "201":
          description: Session 已建立
          headers:
            Set-Cookie:
              schema: {type: string}
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SessionEstablishedResponse"
        "401":
          $ref: "#/components/responses/UnauthenticatedError"
        "403":
          $ref: "#/components/responses/ForbiddenError"
        "429":
          $ref: "#/components/responses/RateLimitedError"
  /api/v1/auth/logout:
    post:
      operationId: logout
      summary: 吊销当前 Session 或 API Token
      parameters:
        - $ref: "#/components/parameters/CSRFHeader"
      responses:
        "204": {description: 当前凭据已吊销}
        "401":
          $ref: "#/components/responses/UnauthenticatedError"
        "403":
          $ref: "#/components/responses/ForbiddenError"
  /api/v1/admin/users:
    get:
      operationId: listLocalUsers
      summary: 列出本地账户
      responses:
        "200":
          description: 本地账户列表
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LocalUserListResponse"
        "403": {$ref: "#/components/responses/ForbiddenError"}
    post:
      operationId: createLocalUser
      summary: 创建本地账户及初始角色和授权
      parameters:
        - $ref: "#/components/parameters/CSRFHeader"
      requestBody:
        required: true
        content:
          application/json:
            schema: {$ref: "#/components/schemas/LocalUserCreateRequest"}
      responses:
        "201":
          description: 本地账户已创建
          content:
            application/json:
              schema: {$ref: "#/components/schemas/LocalUser"}
        "403": {$ref: "#/components/responses/ForbiddenError"}
        "409": {$ref: "#/components/responses/ConflictError"}
  /api/v1/admin/users/{userId}/status:
    patch:
      operationId: setLocalUserStatus
      summary: 启用、停用或软删除本地账户并失效其凭据
      parameters:
        - {name: userId, in: path, required: true, schema: {$ref: "#/components/schemas/UserId"}}
        - $ref: "#/components/parameters/CSRFHeader"
      requestBody:
        required: true
        content:
          application/json:
            schema: {$ref: "#/components/schemas/UserStatusRequest"}
      responses:
        "204": {description: 状态已更新}
        "403": {$ref: "#/components/responses/ForbiddenError"}
        "404": {$ref: "#/components/responses/NotFoundError"}
  /api/v1/account/password:
    post:
      operationId: changeOwnPassword
      summary: 修改当前本地账户密码并失效其全部凭据
      parameters:
        - $ref: "#/components/parameters/CSRFHeader"
      requestBody:
        required: true
        content:
          application/json:
            schema: {$ref: "#/components/schemas/PasswordChangeRequest"}
      responses:
        "204": {description: 密码已修改}
        "401": {$ref: "#/components/responses/UnauthenticatedError"}
        "403": {$ref: "#/components/responses/ForbiddenError"}
  /api/v1/admin/users/{userId}/grants:
    get:
      operationId: listAuthorizationGrants
      summary: 列出账户的显式 allow/deny Grant，包含已吊销记录
      parameters:
        - {name: userId, in: path, required: true, schema: {$ref: "#/components/schemas/UserId"}}
      responses:
        "200":
          description: Grant 列表
          content:
            application/json:
              schema: {$ref: "#/components/schemas/AuthorizationGrantListResponse"}
        "403": {$ref: "#/components/responses/ForbiddenError"}
        "404": {$ref: "#/components/responses/NotFoundError"}
    post:
      operationId: createAuthorizationGrant
      summary: 为账户创建显式 allow 或 deny 授权
      parameters:
        - {name: userId, in: path, required: true, schema: {$ref: "#/components/schemas/UserId"}}
        - $ref: "#/components/parameters/CSRFHeader"
      requestBody:
        required: true
        content:
          application/json:
            schema: {$ref: "#/components/schemas/AuthorizationGrantInput"}
      responses:
        "201":
          description: 授权已创建
          content:
            application/json:
              schema: {$ref: "#/components/schemas/AuthorizationGrant"}
        "403": {$ref: "#/components/responses/ForbiddenError"}
        "404": {$ref: "#/components/responses/NotFoundError"}
  /api/v1/admin/grants/{grantId}:
    delete:
      operationId: revokeAuthorizationGrant
      summary: 吊销授权并立即失效目标账户凭据
      parameters:
        - {name: grantId, in: path, required: true, schema: {$ref: "#/components/schemas/GrantId"}}
        - $ref: "#/components/parameters/CSRFHeader"
      responses:
        "204": {description: 授权已吊销}
        "403": {$ref: "#/components/responses/ForbiddenError"}
        "404": {$ref: "#/components/responses/NotFoundError"}
  /api/v1/api-tokens:
    get:
      operationId: listAPITokens
      summary: 列出当前主体的 API Token 摘要；永不返回 secret
      responses:
        "200":
          description: API Token 列表
          content:
            application/json:
              schema: {$ref: "#/components/schemas/APITokenListResponse"}
        "403": {$ref: "#/components/responses/ForbiddenError"}
    post:
      operationId: createAPIToken
      summary: 创建 API Token；secret 仅在本响应返回一次
      parameters:
        - $ref: "#/components/parameters/CSRFHeader"
      requestBody:
        required: true
        content:
          application/json:
            schema: {$ref: "#/components/schemas/APITokenCreateRequest"}
      responses:
        "201":
          description: API Token 已创建
          content:
            application/json:
              schema: {$ref: "#/components/schemas/APITokenCreated"}
        "403": {$ref: "#/components/responses/ForbiddenError"}
  /api/v1/api-tokens/{tokenId}:
    delete:
      operationId: revokeAPIToken
      summary: 吊销当前主体的 API Token
      parameters:
        - {name: tokenId, in: path, required: true, schema: {$ref: "#/components/schemas/APITokenId"}}
        - $ref: "#/components/parameters/CSRFHeader"
      responses:
        "204": {description: API Token 已吊销}
        "403": {$ref: "#/components/responses/ForbiddenError"}
        "404": {$ref: "#/components/responses/NotFoundError"}
  /api/v1/shares:
    get:
      operationId: listShares
      summary: 列出当前主体创建的分享摘要
      responses:
        "200":
          description: 分享列表
          content:
            application/json:
              schema: {$ref: "#/components/schemas/ShareListResponse"}
        "403": {$ref: "#/components/responses/ForbiddenError"}
    post:
      operationId: createShare
      summary: 创建有界分享；credential 仅在本响应返回一次
      parameters:
        - $ref: "#/components/parameters/CSRFHeader"
      requestBody:
        required: true
        content:
          application/json:
            schema: {$ref: "#/components/schemas/ShareCreateRequest"}
      responses:
        "201":
          description: 分享已创建
          content:
            application/json:
              schema: {$ref: "#/components/schemas/ShareCreated"}
        "403": {$ref: "#/components/responses/ForbiddenError"}
  /api/v1/shares/{shareId}:
    delete:
      operationId: revokeShare
      summary: 吊销分享
      parameters:
        - {name: shareId, in: path, required: true, schema: {$ref: "#/components/schemas/ShareId"}}
        - $ref: "#/components/parameters/CSRFHeader"
      responses:
        "204": {description: 分享已吊销}
        "403": {$ref: "#/components/responses/ForbiddenError"}
        "404": {$ref: "#/components/responses/NotFoundError"}
  /api/v1/public/shares/{credential}:
    get:
      operationId: resolvePublicShare
      summary: 解析未过期且未吊销的分享 credential
      security: []
      parameters:
        - {name: credential, in: path, required: true, schema: {type: string, minLength: 32, maxLength: 256}}
      responses:
        "200":
          description: 分享边界与当前可消费资源；不返回创建者、secret 前缀或内部路径
          content:
            application/json:
              schema: {$ref: "#/components/schemas/PublicShareResource"}
        "404": {$ref: "#/components/responses/NotFoundError"}
  /api/v1/public/shares/{credential}/media/{mediaId}/content:
    parameters:
      - {name: credential, in: path, required: true, schema: {type: string, minLength: 32, maxLength: 256}}
      - {name: mediaId, in: path, required: true, schema: {$ref: "#/components/schemas/CanonicalMediaId"}}
      - name: download
        in: query
        required: false
        description: 为 true 时要求分享含 download 权限，并返回 attachment Content-Disposition。
        schema: {type: boolean, default: false}
      - {name: Range, in: header, required: false, schema: {type: string}}
      - {name: If-None-Match, in: header, required: false, schema: {type: string}}
      - name: If-Range
        in: header
        required: false
        schema: {type: string}
    head:
      operationId: headPublicShareMediaContent
      summary: 读取分享范围内媒体正文的 HTTP metadata
      security: []
      responses:
        "200": {description: 完整内容 metadata}
        "206": {description: 单区间 metadata}
        "304": {description: ETag 未变化}
        "403": {$ref: "#/components/responses/ForbiddenError"}
        "404": {$ref: "#/components/responses/NotFoundError"}
        "409": {$ref: "#/components/responses/ConflictError"}
        "416": {$ref: "#/components/responses/RangeError"}
        "503": {$ref: "#/components/responses/MediaOfflineError"}
    get:
      operationId: getPublicShareMediaContent
      summary: 读取分享范围内的媒体正文；Work/Library 分享只允许其后代媒体
      description: >-
        view 或 download 权限允许内联内容读取；download=true 额外要求 download 权限。
        固定 Media 分享按 sha256-v1 ContentBlob 解析，跟随型分享按当前 publication 解析。
      security: []
      responses:
        "200":
          description: 完整内容
          content:
            application/octet-stream:
              schema: {type: string, format: binary}
        "206":
          description: 单区间内容
          content:
            application/octet-stream:
              schema: {type: string, format: binary}
        "304": {description: ETag 未变化}
        "403": {$ref: "#/components/responses/ForbiddenError"}
        "404": {$ref: "#/components/responses/NotFoundError"}
        "409": {$ref: "#/components/responses/ConflictError"}
        "416": {$ref: "#/components/responses/RangeError"}
        "503": {$ref: "#/components/responses/MediaOfflineError"}
  /api/v1/admin/security-audits:
    get:
      operationId: listSecurityAudits
      summary: 读取脱敏安全审计
      responses:
        "200":
          description: 安全审计列表
          content:
            application/json:
              schema: {$ref: "#/components/schemas/SecurityAuditListResponse"}
        "403": {$ref: "#/components/responses/ForbiddenError"}
  /api/v1/sessions:
    get:
      operationId: listSessions
      summary: 列出服务端 Session
      responses:
        "200":
          description: Session 列表
          content:
            application/json:
              schema:
                type: object
                additionalProperties: false
                required: [sessions]
                properties:
                  sessions:
                    type: array
                    items:
                      $ref: "#/components/schemas/SessionSummary"
        "401":
          $ref: "#/components/responses/UnauthenticatedError"
        "403":
          $ref: "#/components/responses/ForbiddenError"
  /api/v1/sessions/{sessionId}:
    delete:
      operationId: revokeSession
      summary: 吊销指定 Session
      parameters:
        - name: sessionId
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/SessionId"
        - $ref: "#/components/parameters/CSRFHeader"
      responses:
        "204":
          description: Session 已吊销
        "401":
          $ref: "#/components/responses/UnauthenticatedError"
        "403":
          $ref: "#/components/responses/ForbiddenError"
        "404":
          $ref: "#/components/responses/NotFoundError"
  /api/v1/libraries:
    get:
      operationId: listLibraries
      summary: 按 effective library.read scope 列出可见 Library
      responses:
        "200":
          description: 可见 Library 列表
          content:
            application/json:
              schema: {$ref: "#/components/schemas/LibraryListResponse"}
        "401": {$ref: "#/components/responses/UnauthenticatedError"}
        "403": {$ref: "#/components/responses/ForbiddenError"}
    post:
      operationId: createLibrary
      summary: 创建 Library
      parameters:
        - $ref: "#/components/parameters/CSRFHeader"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LibraryCreateRequest"
      responses:
        "201":
          description: Library 已创建
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Library"
        "400":
          $ref: "#/components/responses/ValidationError"
        "401":
          $ref: "#/components/responses/UnauthenticatedError"
        "403":
          $ref: "#/components/responses/ForbiddenError"
  /api/v1/libraries/{libraryId}:
    get:
      operationId: getLibrary
      summary: 读取 Library
      parameters:
        - name: libraryId
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/LibraryId"
      responses:
        "200":
          description: Library
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Library"
        "401":
          $ref: "#/components/responses/UnauthenticatedError"
        "403":
          $ref: "#/components/responses/ForbiddenError"
        "404":
          $ref: "#/components/responses/NotFoundError"
  /api/v1/sources:
    get:
      operationId: listSources
      summary: 按 effective library.read scope 列出不含绝对路径的可见 Source
      parameters:
        - {name: libraryId, in: query, required: false, schema: {$ref: "#/components/schemas/LibraryId"}}
      responses:
        "200":
          description: 可见 Source 列表
          content:
            application/json:
              schema: {$ref: "#/components/schemas/SourceListResponse"}
        "400": {$ref: "#/components/responses/ValidationError"}
        "401": {$ref: "#/components/responses/UnauthenticatedError"}
        "403": {$ref: "#/components/responses/ForbiddenError"}
    post:
      operationId: createSource
      summary: 注册严格只读 Source
      parameters:
        - $ref: "#/components/parameters/CSRFHeader"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SourceCreateRequest"
      responses:
        "201":
          description: Source 已注册
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Source"
        "400":
          $ref: "#/components/responses/ValidationError"
        "401":
          $ref: "#/components/responses/UnauthenticatedError"
        "403":
          $ref: "#/components/responses/ForbiddenError"
        "409":
          $ref: "#/components/responses/ConflictError"
  /api/v1/sources/{sourceId}:
    get:
      operationId: getSource
      summary: 读取不含绝对路径的 Source snapshot
      parameters:
        - name: sourceId
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/SourceId"
      responses:
        "200":
          description: Source
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Source"
        "401":
          $ref: "#/components/responses/UnauthenticatedError"
        "403":
          $ref: "#/components/responses/ForbiddenError"
        "404":
          $ref: "#/components/responses/NotFoundError"
  /api/v1/rules/validate:
    post:
      operationId: validateRulePackage
      summary: 实例化默认值、规范化并校验规则包
      parameters:
        - $ref: "#/components/parameters/CSRFHeader"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RuleValidateRequest"
      responses:
        "200":
          description: 规则包规范化和身份结果
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RuleValidationResult"
        "400": {$ref: "#/components/responses/ValidationError"}
        "401": {$ref: "#/components/responses/UnauthenticatedError"}
        "403": {$ref: "#/components/responses/ForbiddenError"}
  /api/v1/rules/schema:
    get:
      operationId: getRulePackageSchema
      summary: 读取规则包 JSON Schema 与表单元数据契约
      responses:
        "200":
          description: 规则包 Schema
          content:
            application/schema+json:
              schema:
                type: object
                additionalProperties: true
        "401": {$ref: "#/components/responses/UnauthenticatedError"}
        "403": {$ref: "#/components/responses/ForbiddenError"}
  /api/v1/rules/compile:
    post:
      operationId: compileRulePackage
      summary: 编译冻结参数的 Rule IR
      parameters:
        - $ref: "#/components/parameters/CSRFHeader"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RuleCompileRequest"
      responses:
        "200":
          description: 编译结果和缓存命中状态
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RuleCompileResult"
        "400": {$ref: "#/components/responses/ValidationError"}
        "401": {$ref: "#/components/responses/UnauthenticatedError"}
        "403": {$ref: "#/components/responses/ForbiddenError"}
  /api/v1/rules/dry-run:
    post:
      operationId: dryRunRulePackage
      summary: 对显式合成输入执行规则并返回脱敏 Trace
      parameters:
        - $ref: "#/components/parameters/CSRFHeader"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RuleDryRunRequest"
      responses:
        "200":
          description: Dry Run 结果
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RuleDryRunResult"
        "400": {$ref: "#/components/responses/ValidationError"}
        "401": {$ref: "#/components/responses/UnauthenticatedError"}
        "403": {$ref: "#/components/responses/ForbiddenError"}
  /api/v1/rules/impact:
    post:
      operationId: analyzeRuleImpact
      summary: 静态比较两个规则包的重扫、投影、搜索和派生影响
      parameters:
        - $ref: "#/components/parameters/CSRFHeader"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RuleImpactRequest"
      responses:
        "200":
          description: RuleImpact
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RuleImpactResult"
        "400": {$ref: "#/components/responses/ValidationError"}
        "401": {$ref: "#/components/responses/UnauthenticatedError"}
        "403": {$ref: "#/components/responses/ForbiddenError"}
  /api/v1/rules/import:
    post:
      operationId: importRulePackage
      summary: 将 JSON、YAML 或 TOML 导入同一份规范 JSON
      parameters:
        - $ref: "#/components/parameters/CSRFHeader"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RuleImportRequest"
      responses:
        "200":
          description: 导入结果
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RuleImportResult"
        "400": {$ref: "#/components/responses/ValidationError"}
        "401": {$ref: "#/components/responses/UnauthenticatedError"}
        "403": {$ref: "#/components/responses/ForbiddenError"}
  /api/v1/rules/diff:
    post:
      operationId: diffRulePackages
      summary: 返回规则包结构化 diff 与影响分类
      parameters:
        - $ref: "#/components/parameters/CSRFHeader"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RulePackageDiffRequest"
      responses:
        "200":
          description: RuleVersion diff
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RuleVersionDiff"
        "400": {$ref: "#/components/responses/ValidationError"}
