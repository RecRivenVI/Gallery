name: Bug 报告
description: 报告 Gallery 代码或行为中的具体缺陷（不包括安全漏洞）
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        提交前请确认：这不是安全漏洞（见 [SECURITY.md](https://github.com/RecRivenVI/Gallery/blob/main/SECURITY.md)），也不是安装或使用咨询（Gallery 目前尚无图形界面或安装包，见 [README.md](https://github.com/RecRivenVI/Gallery/blob/main/README.md)）。

  - type: input
    id: commit
    attributes:
      label: Commit SHA / 分支
      description: 复现问题时所在的 commit SHA 或分支名
      placeholder: 例如 63d50ae 或 main
    validations:
      required: true

  - type: input
    id: os
    attributes:
      label: 操作系统
      placeholder: 例如 Windows 11 x64 / Ubuntu 22.04 / WSL2 Debian
    validations:
      required: true

  - type: input
    id: goversion
    attributes:
      label: Go 版本
      description: "`go version` 的输出"
    validations:
      required: true

  - type: textarea
    id: command
    attributes:
      label: 执行的命令或 API 调用
      description: 具体命令行、HTTP 请求或涉及的 API 路径
    validations:
      required: true

  - type: input
    id: module
    attributes:
      label: 涉及模块
      description: 例如 scanner / catalog / rules / media 等
    validations:
      required: false

  - type: input
    id: scanprofile
    attributes:
      label: scanProfile（如适用）
      description: index / incremental / verify，或留空说明未涉及扫描
    validations:
      required: false

  - type: textarea
    id: repro
    attributes:
      label: 最小复现步骤
      description: 请提供可以让维护者独立复现的最小步骤
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: 预期结果
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: 实际结果
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: 相关日志（已脱敏）
      description: 请去除 token、Cookie、完整个人路径和真实媒体内容后再粘贴
      render: shell
    validations:
      required: false

  - type: dropdown
    id: reproducible
    attributes:
      label: 是否可以稳定复现
      options:
        - "是，每次都能复现"
        - "偶发，多次尝试中部分复现"
        - "只出现过一次"
    validations:
      required: true

  - type: checkboxes
    id: privacy
    attributes:
      label: 隐私确认
      options:
        - label: 我确认以上内容不包含 token、Cookie、完整个人路径或真实媒体内容
          required: true
