name: 功能建议
description: 为 Gallery 提出新功能或行为改进
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Gallery 是净室实现，不以任何旧 Gallery 的数据库、配置、API 或目录结构作为兼容或迁移目标；核心业务也不接受针对单一 Provider 或平台的硬编码分支（差异应通过规则系统表达）。提交前请先确认建议符合这两点。

  - type: textarea
    id: usecase
    attributes:
      label: 使用场景
      description: 描述你实际遇到的使用场景，而不仅是期望的实现方式
    validations:
      required: true

  - type: textarea
    id: problem
    attributes:
      label: 当前问题
      description: 现状为什么无法满足这个场景
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: 建议行为
    validations:
      required: true

  - type: dropdown
    id: readonly
    attributes:
      label: 是否影响 Source 只读边界
      options:
        - "否"
        - "是"
        - "不确定"
    validations:
      required: true

  - type: dropdown
    id: api
    attributes:
      label: 是否影响公开 API
      options:
        - "否"
        - "是"
        - "不确定"
    validations:
      required: true

  - type: dropdown
    id: generic
    attributes:
      label: 是否属于通用能力
      description: 而非只服务单一用户或单一场景的定制需求
      options:
        - "是，通用能力"
        - "否，是特定场景的定制需求"
        - "不确定"
    validations:
      required: true

  - type: checkboxes
    id: constraints
    attributes:
      label: 边界确认
      options:
        - label: 该建议不依赖特定 Provider 或平台的硬编码分支
          required: true
        - label: 该建议不以兼容或迁移某个旧 Gallery 实现为目标
          required: true

  - type: textarea
    id: alternatives
    attributes:
      label: 可接受的替代方案
      description: 如果你考虑过其它实现方式，欢迎一并列出
    validations:
      required: false
