        "401":
          $ref: "#/components/responses/UnauthenticatedError"
        "403":
          $ref: "#/components/responses/ForbiddenError"
        "404":
          $ref: "#/components/responses/NotFoundError"
    put:
      operationId: putWorkOverlay
      summary: 同步替换 Overlay fact，并在查询语义变化时排队异步 projection
      parameters:
        - name: workId
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/CanonicalWorkId"
        - $ref: "#/components/parameters/CSRFHeader"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/WorkOverlayPutRequest"
      responses:
        "200":
          description: fact 已同步持久化；projectionStatus 表明查询投影进度
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WorkOverlayState"
        "400":
          $ref: "#/components/responses/ValidationError"
        "401":
          $ref: "#/components/responses/UnauthenticatedError"
        "403":
          $ref: "#/components/responses/ForbiddenError"
        "404":
          $ref: "#/components/responses/NotFoundError"
  /api/v1/works/{workId}/media:
    get:
      operationId: listWorkMedia
      summary: 查询当前 publication 中作品的媒体
      parameters:
        - name: workId
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/CanonicalWorkId"
      responses:
        "200":
          description: MediaProjection 列表
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MediaListResponse"
        "401":
          $ref: "#/components/responses/UnauthenticatedError"
        "403":
          $ref: "#/components/responses/ForbiddenError"
        "404":
          $ref: "#/components/responses/NotFoundError"
  /api/v1/media/{mediaId}:
    get:
      operationId: getMedia
      summary: 读取稳定 Media ID 对应的当前 MediaProjection
      parameters:
        - name: mediaId
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/CanonicalMediaId"
      responses:
        "200":
          description: MediaProjection
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PublishedMedia"
        "401":
          $ref: "#/components/responses/UnauthenticatedError"
        "403":
          $ref: "#/components/responses/ForbiddenError"
        "404":
          $ref: "#/components/responses/NotFoundError"
  /api/v1/media/{mediaId}/content:
    parameters:
      - name: mediaId
        in: path
        required: true
        schema:
          $ref: "#/components/schemas/CanonicalMediaId"
      - name: Range
        in: header
        required: false
        schema:
          type: string
      - name: If-None-Match
        in: header
        required: false
        schema:
          type: string
    head:
      operationId: headMediaContent
      summary: 读取稳定 Media ID 内容的 HTTP metadata
      responses:
        "200":
          description: 完整内容 metadata
          headers:
            Accept-Ranges: {schema: {type: string, enum: [bytes]}}
            Content-Length: {schema: {type: integer, format: int64}}
            ETag: {schema: {type: string}}
        "206":
          description: 单区间 metadata
          headers:
            Accept-Ranges: {schema: {type: string, enum: [bytes]}}
            Content-Length: {schema: {type: integer, format: int64}}
            Content-Range: {schema: {type: string}}
            ETag: {schema: {type: string}}
        "304":
          description: ETag 未变化
        "401": {$ref: "#/components/responses/UnauthenticatedError"}
        "403": {$ref: "#/components/responses/ForbiddenError"}
        "404": {$ref: "#/components/responses/NotFoundError"}
        "409": {$ref: "#/components/responses/ConflictError"}
        "416": {$ref: "#/components/responses/RangeError"}
        "503": {$ref: "#/components/responses/MediaOfflineError"}
    get:
      operationId: getMediaContent
      summary: 完整或单区间读取稳定 Media ID 内容
      responses:
        "200":
          description: 完整内容
          headers:
            Accept-Ranges: {schema: {type: string, enum: [bytes]}}
            Content-Length: {schema: {type: integer, format: int64}}
            ETag: {schema: {type: string}}
          content:
            application/octet-stream:
              schema: {type: string, format: binary}
        "206":
          description: 单区间内容
          headers:
            Accept-Ranges: {schema: {type: string, enum: [bytes]}}
            Content-Length: {schema: {type: integer, format: int64}}
            Content-Range: {schema: {type: string}}
            ETag: {schema: {type: string}}
          content:
            application/octet-stream:
              schema: {type: string, format: binary}
        "304":
          description: ETag 未变化
        "401": {$ref: "#/components/responses/UnauthenticatedError"}
        "403": {$ref: "#/components/responses/ForbiddenError"}
        "404": {$ref: "#/components/responses/NotFoundError"}
        "409": {$ref: "#/components/responses/ConflictError"}
        "416": {$ref: "#/components/responses/RangeError"}
        "503": {$ref: "#/components/responses/MediaOfflineError"}
  /api/v1/creators:
    get:
      operationId: listCreators
      summary: 列出 CanonicalCreator 及其有效合并状态
      responses:
        "200":
          description: 全部 CanonicalCreator
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreatorListResponse"
        "401":
          $ref: "#/components/responses/UnauthenticatedError"
        "403":
          $ref: "#/components/responses/ForbiddenError"
  /api/v1/creators/{creatorId}:
    get:
      operationId: getCreator
