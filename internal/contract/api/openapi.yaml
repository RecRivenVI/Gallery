        "400":
          $ref: "#/components/responses/ValidationError"
        "401":
          $ref: "#/components/responses/UnauthenticatedError"
        "403":
          $ref: "#/components/responses/ForbiddenError"
        "404":
          $ref: "#/components/responses/NotFoundError"
        "409":
          $ref: "#/components/responses/ConflictError"
  /api/v1/binding-issues/{issueId}/reopen:
    post:
      operationId: reopenBindingIssue
      summary: 重新打开被忽略、过时或被替代的 Binding issue
      parameters:
        - name: issueId
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/BindingIssueId"
        - $ref: "#/components/parameters/CSRFHeader"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BindingIssueVersionRequest"
      responses:
        "200":
          description: 已重新打开
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BindingIssue"
        "400":
          $ref: "#/components/responses/ValidationError"
        "401":
          $ref: "#/components/responses/UnauthenticatedError"
        "403":
          $ref: "#/components/responses/ForbiddenError"
        "404":
          $ref: "#/components/responses/NotFoundError"
        "409":
          $ref: "#/components/responses/ConflictError"
  /api/v1/binding-issues/{issueId}/resolve-structure:
    post:
      operationId: resolveSourceStructureIssue
      summary: 对 SourceWork 拆分或合并审查 issue 应用人工决策，以 pre-seed Binding 表达，不改写 Canonical 用户事实
      parameters:
        - name: issueId
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/BindingIssueId"
        - $ref: "#/components/parameters/CSRFHeader"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SourceStructureDecisionRequest"
      responses:
        "200":
          description: 决策结果
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SourceStructureDecision"
        "400":
          $ref: "#/components/responses/ValidationError"
        "401":
          $ref: "#/components/responses/UnauthenticatedError"
        "403":
          $ref: "#/components/responses/ForbiddenError"
        "404":
          $ref: "#/components/responses/NotFoundError"
        "409":
          $ref: "#/components/responses/ConflictError"
  /api/v1/source-structure-decisions:
    get:
      operationId: listSourceStructureDecisions
      summary: 列出 SourceWork 拆分/合并人工决策记录
      parameters:
        - {name: sourceId, in: query, required: false, schema: {$ref: "#/components/schemas/SourceId"}}
        - {name: status, in: query, required: false, schema: {type: string, enum: [applied, undone]}}
        - {name: limit, in: query, required: false, schema: {type: integer, minimum: 1, maximum: 200, default: 50}}
      responses:
        "200":
          description: 决策列表
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SourceStructureDecisionListResponse"
        "400":
          $ref: "#/components/responses/ValidationError"
        "401":
          $ref: "#/components/responses/UnauthenticatedError"
        "403":
          $ref: "#/components/responses/ForbiddenError"
  /api/v1/source-structure-decisions/{decisionId}:
    get:
      operationId: getSourceStructureDecision
      summary: 读取单条 SourceWork 拆分/合并决策
      parameters:
        - name: decisionId
          in: path
          required: true
          schema:
            type: string
            minLength: 1
            maxLength: 128
      responses:
        "200":
          description: 决策
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SourceStructureDecision"
        "401":
          $ref: "#/components/responses/UnauthenticatedError"
        "403":
          $ref: "#/components/responses/ForbiddenError"
        "404":
          $ref: "#/components/responses/NotFoundError"
  /api/v1/source-structure-decisions/{decisionId}/undo:
    post:
      operationId: undoSourceStructureDecision
      summary: 撤回尚未被扫描消费的拆分/合并决策
      description: >-
        这是「撤回尚未应用的结构决策」，不是对已生效结构变化的完整反向操作。仅当决策的 pre-seed Binding
        尚未被下一次扫描消费（新 source_key 尚未产生 active Binding）时才清除 pre-seed Binding 并重开审查
        issue；一旦决策已被扫描消费并产生实际 Binding（可能已有 Overlay/Favorite/Progress 依赖），返回稳定
        CONFLICT 且不部分修改决策、issue 或 Binding。若需反转已生效的结构变化，应通过新的人工决策或未来补偿
        流程处理。
      parameters:
        - name: decisionId
          in: path
          required: true
          schema:
            type: string
            minLength: 1
            maxLength: 128
        - $ref: "#/components/parameters/CSRFHeader"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BindingIssueVersionRequest"
      responses:
        "200":
          description: 已撤回（决策标记 undone、pre-seed Binding 清除、审查 issue 重开）
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SourceStructureDecision"
        "400":
          $ref: "#/components/responses/ValidationError"
        "401":
          $ref: "#/components/responses/UnauthenticatedError"
        "403":
          $ref: "#/components/responses/ForbiddenError"
        "404":
          $ref: "#/components/responses/NotFoundError"
        "409":
          $ref: "#/components/responses/ConflictError"
  /api/v1/binding-actions/unbind-work:
    post:
      operationId: unbindWork
      summary: 手动解绑 SourceWork，下一次扫描将其拆分为新的 CanonicalWork
      parameters:
        - $ref: "#/components/parameters/CSRFHeader"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BindingUnbindRequest"
      responses:
        "200":
          description: 已解绑
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BindingActionResult"
        "400":
          $ref: "#/components/responses/ValidationError"
        "401":
          $ref: "#/components/responses/UnauthenticatedError"
        "403":
          $ref: "#/components/responses/ForbiddenError"
        "404":
          $ref: "#/components/responses/NotFoundError"
  /api/v1/binding-actions/unbind-media:
    post:
      operationId: unbindMedia
      summary: 手动解绑 SourceMedia，下一次扫描建立新的 CanonicalMedia occurrence
      parameters:
        - $ref: "#/components/parameters/CSRFHeader"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BindingUnbindRequest"
      responses:
        "200":
          description: 已解绑
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BindingActionResult"
        "400":
          $ref: "#/components/responses/ValidationError"
        "401":
          $ref: "#/components/responses/UnauthenticatedError"
        "403":
          $ref: "#/components/responses/ForbiddenError"
        "404":
          $ref: "#/components/responses/NotFoundError"
  /api/v1/binding-actions/undo-unbind:
    post:
      operationId: undoManualUnbind
      summary: 撤销一次手动 Work 解绑，恢复原 Binding
      parameters:
        - $ref: "#/components/parameters/CSRFHeader"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BindingUnbindRequest"
      responses:
        "200":
          description: 已撤销
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BindingActionResult"
        "400":
          $ref: "#/components/responses/ValidationError"
        "401":
          $ref: "#/components/responses/UnauthenticatedError"
        "403":
          $ref: "#/components/responses/ForbiddenError"
        "404":
          $ref: "#/components/responses/NotFoundError"
        "409":
          $ref: "#/components/responses/ConflictError"
  /api/v1/orphan-candidates:
    get:
      operationId: listOrphanCandidates
      summary: 列出到达保留窗口、等待人工审查的 orphan candidate Binding
      parameters:
        - {name: sourceId, in: query, required: false, schema: {$ref: "#/components/schemas/SourceId"}}
        - {name: entityType, in: query, required: false, schema: {type: string, enum: [work, creator, media]}}
        - {name: cursor, in: query, required: false, schema: {type: string, maxLength: 4096}}
        - {name: limit, in: query, required: false, schema: {type: integer, minimum: 1, maximum: 200, default: 50}}
      responses:
        "200":
          description: orphan candidate 列表
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OrphanCandidateListResponse"
        "400":
          $ref: "#/components/responses/ValidationError"
        "401":
          $ref: "#/components/responses/UnauthenticatedError"
        "403":
          $ref: "#/components/responses/ForbiddenError"
  /api/v1/orphan-candidates/{bindingId}/decide:
    post:
      operationId: decideOrphanCandidate
      summary: 对 orphan candidate 应用保留、延长、确认孤立或解绑决策，不删除 Canonical 与用户事实
      parameters:
        - name: bindingId
          in: path
          required: true
          schema:
            type: string
            minLength: 1
            maxLength: 128
        - $ref: "#/components/parameters/CSRFHeader"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/OrphanDecisionRequest"
      responses:
        "200":
          description: 决策结果
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OrphanDecisionResult"
        "400":
          $ref: "#/components/responses/ValidationError"
        "401":
          $ref: "#/components/responses/UnauthenticatedError"
        "403":
          $ref: "#/components/responses/ForbiddenError"
        "404":
          $ref: "#/components/responses/NotFoundError"
        "409":
          $ref: "#/components/responses/ConflictError"
components:
  securitySchemes:
    sessionCookie:
      type: apiKey
      in: cookie
      name: gallery_session
    apiToken:
      type: http
      scheme: bearer
  parameters:
    CSRFHeader:
      name: X-Gallery-CSRF
      in: header
      required: true
      schema:
        type: string
        minLength: 32
        maxLength: 256
    IdempotencyKey:
      name: Idempotency-Key
      in: header
      required: false
      schema:
        type: string
        minLength: 1
        maxLength: 256
    IfMatch:
      name: If-Match
      in: header
      required: false
      schema:
        type: string
        pattern: '^"?[0-9]+"?$'
  responses:
    InternalError:
      description: 内部失败；不返回堆栈、路径或数据库文本
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorEnvelope"
    UnauthenticatedError:
      description: Session 无效、过期或已吊销
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorEnvelope"
    ForbiddenError:
      description: capability、请求来源或 CSRF 校验失败
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorEnvelope"
    NotFoundError:
      description: 资源不存在或当前主体不可见
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorEnvelope"
    ValidationError:
      description: 请求字段、路径或规则校验失败
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorEnvelope"
    ConflictError:
      description: 资源或同类操作冲突
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorEnvelope"
    RangeError:
      description: Range 无效或不支持多区间
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorEnvelope"
    MediaOfflineError:
      description: 当前 publication 中的媒体位置暂不可用
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorEnvelope"
  schemas:
    HealthResponse:
      type: object
      additionalProperties: false
      required: [status, apiVersion, databases]
      properties:
        status:
          type: string
          enum: [ok]
        apiVersion:
          type: string
          enum: [v1]
        databases:
          type: object
          additionalProperties: false
          required: [control, catalog]
          properties:
            control:
              type: string
              enum: [ok]
            catalog:
              type: string
              enum: [ok]
    BootstrapResponse:
      type: object
      additionalProperties: false
      required:
        - mode
        - authenticated
        - availableCapabilities
        - effectiveCapabilities
        - csrfToken
        - apiVersion
        - websocketProtocolVersion
        - sortProtocolVersion
        - ruleSchemaVersion
      properties:
        mode:
          type: string
          enum: [personal, lan]
        authenticated:
          type: boolean
        availableCapabilities:
          type: array
          items:
            type: string
        principalId:
          type: string
          nullable: true
        effectiveCapabilities:
          type: array
          items:
            type: string
        csrfToken:
          type: string
          minLength: 32
          maxLength: 256
        apiVersion:
          type: string
          enum: [v1]
        websocketProtocolVersion:
          type: integer
          enum: [1]
        sortProtocolVersion:
          type: integer
          enum: [1]
        ruleSchemaVersion:
          type: integer
          enum: [1]
    ErrorEnvelope:
      type: object
      additionalProperties: false
      required: [error]
      properties:
        error:
          $ref: "#/components/schemas/ErrorDetail"
    ErrorDetail:
      type: object
      additionalProperties: false
      required: [code, retryable, correlationId]
      properties:
        code:
          $ref: "#/components/schemas/ErrorCode"
        retryable:
          type: boolean
        correlationId:
          type: string
          minLength: 1
          maxLength: 128
        field:
          type: string
          minLength: 1
          maxLength: 512
    ErrorCode:
      type: string
      enum:
        - INTERNAL_ERROR
        - VALIDATION_ERROR
        - CONFIG_INVALID
        - UNAUTHENTICATED
        - FORBIDDEN
        - NOT_FOUND
        - CONFLICT
        - APPDIRS_SOURCE_OVERLAP
        - SOURCE_ROOTS_OVERLAP
        - DATABASE_OPEN_FAILED
        - MIGRATION_FAILED
        - BACKUP_FAILED
        - CURSOR_INVALID
        - CURSOR_EXPIRED
        - QUERY_TOO_SHORT
        - OVERLAY_FACT_INVALID
        - OVERLAY_PROJECTION_FAILED
        - BINDING_REVIEW_REQUIRED
        - DERIVED_ASSET_INVALID
        - DERIVED_ASSET_FAILED
        - EXTERNAL_TOOL_FAILED
        - RULE_SCHEMA_INVALID
        - RULE_COMPILE_ERROR
        - RULE_CEL_LIMIT
        - RULE_DRY_RUN_FAILED
        - RULE_IMPACT_FAILED
        - RULE_EVAL_ERROR
        - CATALOG_PUBLICATION_MISSING
        - CONTENT_CHANGED_DURING_HASH
        - MEDIA_OFFLINE
        - HOST_REJECTED
        - ORIGIN_REJECTED
        - CSRF_INVALID
        - PAIRING_INVALID
        - PAIRING_EXPIRED
        - SOURCE_PATH_INVALID
        - RULE_PARAMETER_INVALID
        - RULE_DRAFT_CONFLICT
        - RULE_PACKAGE_CONFLICT
        - RULE_PARAMETER_CONFLICT
        - RULE_PUBLISH_BLOCKED
        - RULE_ROLLBACK_BLOCKED
        - RULE_VERSION_IN_USE
        - RULE_IMPORT_INVALID
        - RULE_BINDING_CONFLICT
        - JOB_STATE_CONFLICT
        - JOB_PROGRESS_REGRESSION
        - JOB_RETRY_EXHAUSTED
        - JOB_CANCELLATION_REQUESTED
        - SCAN_ALREADY_RUNNING
        - CONTENT_HASH_PENDING
        - DISK_SPACE_INSUFFICIENT
        - MAINTENANCE_BLOCKED
        - WATCHER_OVERFLOW
        - SOURCE_IDENTITY_CHANGED
        - SOURCE_PERMISSION_DENIED
        - SOURCE_UNAVAILABLE
        - SOURCE_READ_FAILED
        - CONTENT_DISAPPEARED
        - PATH_ESCAPE
        - CATALOG_CANDIDATE_INVALID
        - PROCESS_INTERRUPTED
        - RANGE_INVALID
        - RESTORE_FAILED
        - BACKUP_NOT_FOUND
        - BACKUP_CORRUPT
        - BACKUP_INCOMPATIBLE
        - SOURCE_WORK_SPLIT_REVIEW_REQUIRED
        - SOURCE_WORK_MERGE_REVIEW_REQUIRED
    Job:
      type: object
      additionalProperties: false
      required: [id, type, status, stage, progress, attempt, createdAt, updatedAt]
      properties:
        id:
          $ref: "#/components/schemas/JobId"
        type:
          type: string
          enum: [scan, hash, overlay_projection, derived, external_tool, control_backup, control_restore, catalog_gc, catalog_checkpoint, catalog_vacuum, derived_gc]
        sourceId:
          $ref: "#/components/schemas/SourceId"
        status:
          type: string
          enum: [queued, running, publishing, cancelling, completed, failed, cancelled, superseded, needs_repair]
        stage:
          type: string
        progress:
          type: object
          additionalProperties: false
          required: [current, total, sequence]
          properties:
            current:
              type: integer
              format: int64
              minimum: 0
            total:
              type: integer
              format: int64
              minimum: 0
            sequence:
              type: integer
              format: int64
              minimum: 1
            phase:
              type: string
            unit:
              type: string
            message:
              type: string
            bytes:
              type: integer
              format: int64
              minimum: 0
            entities:
              type: integer
              format: int64
              minimum: 0
            estimated:
              type: boolean
        issueCode:
          type: string
          nullable: true
        queryPublicationId:
          allOf:
            - $ref: "#/components/schemas/QueryPublicationId"
          nullable: true
        retryOf:
          allOf:
            - $ref: "#/components/schemas/JobId"
          nullable: true
        attempt:
          type: integer
          minimum: 1
        createdAt:
          type: string
          format: date-time
        startedAt:
          type: string
          format: date-time
          nullable: true
        finishedAt:
          type: string
          format: date-time
          nullable: true
        updatedAt:
          type: string
          format: date-time
        ruleSemanticHash:
          $ref: "#/components/schemas/SHA256Digest"
        ruleParametersHash:
          $ref: "#/components/schemas/SHA256Digest"
        ruleIrHash:
          $ref: "#/components/schemas/SHA256Digest"
        compilerVersion:
          type: string
        celProfileVersion:
          type: string
        extensionRegistryVersion:
          type: string
        resourceClass:
          type: string
        targetResource:
          type: string
        failureRetryable:
          type: boolean
        cancelRequested:
          type: boolean

    JobListResponse:
      type: object
      additionalProperties: false
      required: [jobs]
      properties:
        jobs:
          type: array
          items: {$ref: "#/components/schemas/Job"}

    JobAttempt:
      type: object
      additionalProperties: false
      required: [attemptId, jobId, attempt, resourceClass, status, progressSequence, createdAt, updatedAt]
      properties:
        attemptId: {type: string}
        jobId: {$ref: "#/components/schemas/JobId"}
        attempt: {type: integer, minimum: 1}
        resourceClass: {type: string}
        status:
          type: string
          enum: [queued, running, completed, failed, cancelled, recovered]
        startedAt: {type: string, format: date-time, nullable: true}
        heartbeatAt: {type: string, format: date-time, nullable: true}
        finishedAt: {type: string, format: date-time, nullable: true}
        errorCode: {type: string, nullable: true}
        errorRetryable: {type: boolean}
        progressSequence: {type: integer, format: int64, minimum: 1}
        createdAt: {type: string, format: date-time}
        updatedAt: {type: string, format: date-time}

    JobAttemptsResponse:
      type: object
      additionalProperties: false
      required: [attempts]
      properties:
        attempts:
          type: array
          items: {$ref: "#/components/schemas/JobAttempt"}

    SourceScanState:
      type: object
