  /api/v1/works:
    get:
      operationId: listWorks
      summary: 在合法双 revision publication 上搜索、过滤、排序和快照分页
      parameters:
        - {name: q, in: query, required: false, schema: {type: string, maxLength: 4096}}
        - {name: tag, in: query, required: false, schema: {type: string, maxLength: 512}}
        - {name: libraryId, in: query, required: false, schema: {$ref: "#/components/schemas/LibraryId"}}
        - {name: sourceId, in: query, required: false, schema: {$ref: "#/components/schemas/SourceId"}}
        - name: filter
          in: query
          required: false
          description: >-
            服务端权威结构化过滤 AST 的 JSON 编码：{"all"|"any"|"not"|"field"/"op"/"value"}。
            未知字段、未知操作符或类型错误一律返回 VALIDATION_ERROR。已注册字段与语义见
            Documents/规范/06-查询-搜索与排序.md。
          schema: {type: string, maxLength: 8192}
        - {name: sortDirection, in: query, required: false, schema: {type: string, enum: [asc, desc], default: asc}}
        - {name: limit, in: query, required: false, schema: {type: integer, minimum: 1, maximum: 200, default: 50}}
        - {name: cursor, in: query, required: false, schema: {type: string, maxLength: 16384}}
        - {name: queryPublicationId, in: query, required: false, schema: {$ref: "#/components/schemas/QueryPublicationId"}}
        - {name: omitTotal, in: query, required: false, schema: {type: boolean, default: false}}
      responses:
        "200":
          description: 当前快照中的作品
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WorkListResponse"
        "400":
          $ref: "#/components/responses/ValidationError"
        "401":
          $ref: "#/components/responses/UnauthenticatedError"
        "403":
          $ref: "#/components/responses/ForbiddenError"
        "404":
          $ref: "#/components/responses/NotFoundError"
        "409":
          $ref: "#/components/responses/ConflictError"
  /api/v1/works/{workId}:
    get:
      operationId: getWork
      summary: 读取当前 publication 中的作品
      parameters:
        - name: workId
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/CanonicalWorkId"
      responses:
        "200":
          description: WorkProjection
          content:
            application/json:
              schema:
