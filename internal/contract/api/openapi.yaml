          maxLength: 64
        parameters:
          type: object
          additionalProperties: true
    MatchSpan:
      type: object
      additionalProperties: false
      required: [start, end]
      description: >-
        原文 code point（rune）偏移，左闭右开；不是 UTF-16 code unit，也不是字节偏移。
      properties:
        start: {type: integer, minimum: 0}
        end: {type: integer, minimum: 0}
    FieldMatch:
      type: object
      additionalProperties: false
      required: [field, value, spans]
      description: >-
        通用、版本化的搜索命中表达，取代仅覆盖标题的 titleHighlights。field 为
        title/creator/tag/filename 之一；value 是命中的原始显示值——tag/filename 是
        具体命中的那一个取值（不是整个列表），filename 只是 path.Base 之后的安全
        显示名，不泄露相对/绝对路径；同一字段可能出现多个条目（例如两个不同的 tag
        分别命中）。单个 Work 的 matches 数与每个 value 的展示长度均有服务端截断。
      properties:
        field:
          type: string
          enum: [title, creator, tag, filename]
        value:
          type: string
        spans:
          type: array
          items:
            $ref: "#/components/schemas/MatchSpan"
    DependencyField:
      type: object
      additionalProperties: false
      required: [field, role]
      description: >-
        本次查询实际用到的一个依赖字段，由服务端 planner 按实际请求生成（不是把全部
        已注册字段的静态能力表当成这次查询的依赖集合）。同一字段可能因为不同用途
        出现多次。
      properties:
        field:
          type: string
        role:
          type: string
          enum: [predicate, ordering, search, membership, resource]
    Total:
      type: object
      additionalProperties: false
      required: [mode, protocolVersion]
      description: >-
        exact 精确计数；lower_bound 命中数超过服务端预算时的下限估算（value 为预算值）；
        omitted 客户端通过 omitTotal 显式跳过统计。预算数值本身 PRE_FREEZE。
      properties:
        mode:
          type: string
          enum: [exact, lower_bound, omitted]
        value:
          type: integer
          format: int64
          minimum: 0
        protocolVersion:
          type: integer
          enum: [1]
    PublishedWork:
      type: object
      additionalProperties: false
      required: [id, title, creator, tags, mediaCount, favorite, progress, queryPublicationId]
      properties:
        id:
          $ref: "#/components/schemas/CanonicalWorkId"
        title:
          type: string
        creator:
          type: string
        tags:
          type: array
