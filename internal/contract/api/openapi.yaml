      pattern: "^ses_[0-9a-f]{8}-[0-9a-f]{4}-7[0-9a-f]{3}-[89ab][0-9a-f]{3}-[0-9a-f]{12}$"
    UserId:
      type: string
      pattern: "^usr_[0-9a-f]{8}-[0-9a-f]{4}-7[0-9a-f]{3}-[89ab][0-9a-f]{3}-[0-9a-f]{12}$"
    GrantId:
      type: string
      pattern: "^grnt_[0-9a-f]{8}-[0-9a-f]{4}-7[0-9a-f]{3}-[89ab][0-9a-f]{3}-[0-9a-f]{12}$"
    APITokenId:
      type: string
      pattern: "^tok_[0-9a-f]{8}-[0-9a-f]{4}-7[0-9a-f]{3}-[89ab][0-9a-f]{3}-[0-9a-f]{12}$"
    ShareId:
      type: string
      pattern: "^shr_[0-9a-f]{8}-[0-9a-f]{4}-7[0-9a-f]{3}-[89ab][0-9a-f]{3}-[0-9a-f]{12}$"
    ResourceScope:
      type: object
      additionalProperties: false
      required: [kind]
      properties:
        kind: {type: string, enum: [global, library, source]}
        id: {type: string, maxLength: 128}
    AuthorizationGrantInput:
      type: object
      additionalProperties: false
      required: [effect, capability, scope]
      properties:
        effect: {type: string, enum: [allow, deny]}
        capability: {type: string, minLength: 1, maxLength: 128}
        scope: {$ref: "#/components/schemas/ResourceScope"}
    AuthorizationGrant:
      allOf:
        - $ref: "#/components/schemas/AuthorizationGrantInput"
        - type: object
          additionalProperties: false
          required: [id, principalId, revoked]
          properties:
            id: {$ref: "#/components/schemas/GrantId"}
            principalId: {type: string, minLength: 1, maxLength: 128}
            revoked: {type: boolean}
    AuthorizationGrantListResponse:
      type: object
      additionalProperties: false
      required: [grants]
      properties:
        grants:
          type: array
          items: {$ref: "#/components/schemas/AuthorizationGrant"}
    LANOwnerInitializeRequest:
      type: object
      additionalProperties: false
      required: [username, displayName, password]
      properties:
        username: {type: string, minLength: 1, maxLength: 128}
        displayName: {type: string, minLength: 1, maxLength: 128}
        password: {type: string, minLength: 10, maxLength: 1024}
    LoginRequest:
      type: object
      additionalProperties: false
      required: [username, password]
      properties:
        username: {type: string, minLength: 1, maxLength: 128}
        password: {type: string, minLength: 1, maxLength: 1024}
        clientLabel: {type: string, maxLength: 128}
    LocalUserCreateRequest:
      allOf:
        - $ref: "#/components/schemas/LANOwnerInitializeRequest"
        - type: object
          additionalProperties: false
          required: [roles, grants]
          properties:
            roles:
              type: array
              minItems: 1
              uniqueItems: true
              items: {type: string, enum: [owner, operator, viewer]}
            grants:
              type: array
              items: {$ref: "#/components/schemas/AuthorizationGrantInput"}
    LocalUser:
      type: object
      additionalProperties: false
      required: [id, username, displayName, status, roles, securityVersion, createdAt, updatedAt]
      properties:
        id: {$ref: "#/components/schemas/UserId"}
        username: {type: string}
        displayName: {type: string}
        status: {type: string, enum: [active, disabled, deleted]}
        roles:
          type: array
          items: {type: string, enum: [owner, operator, viewer]}
        securityVersion: {type: integer, format: int64, minimum: 1}
        createdAt: {type: string, format: date-time}
        updatedAt: {type: string, format: date-time}
    LocalUserListResponse:
      type: object
      additionalProperties: false
      required: [users]
      properties:
        users:
          type: array
          items: {$ref: "#/components/schemas/LocalUser"}
    UserStatusRequest:
      type: object
      additionalProperties: false
      required: [status]
      properties:
        status: {type: string, enum: [active, disabled, deleted]}
    PasswordChangeRequest:
      type: object
      additionalProperties: false
      required: [currentPassword, newPassword]
      properties:
        currentPassword: {type: string, minLength: 1, maxLength: 1024}
        newPassword: {type: string, minLength: 10, maxLength: 1024}
    APIToken:
      type: object
      additionalProperties: false
      required: [id, principalId, name, secretPrefix, capabilities, scopes, createdAt, revoked]
      properties:
        id: {$ref: "#/components/schemas/APITokenId"}
        principalId: {type: string}
        name: {type: string, minLength: 1, maxLength: 128}
        secretPrefix: {type: string, minLength: 1, maxLength: 16}
        capabilities:
          type: array
          items: {type: string}
        scopes:
          type: array
          items: {$ref: "#/components/schemas/ResourceScope"}
        createdAt: {type: string, format: date-time}
        expiresAt: {type: string, format: date-time, nullable: true}
        lastUsedAt: {type: string, format: date-time, nullable: true}
        revoked: {type: boolean}
    APITokenCreateRequest:
      type: object
      additionalProperties: false
      required: [name, capabilities, scopes]
      properties:
        name: {type: string, minLength: 1, maxLength: 128}
        capabilities:
          type: array
          minItems: 1
          uniqueItems: true
          items: {type: string}
        scopes:
          type: array
          minItems: 1
          items: {$ref: "#/components/schemas/ResourceScope"}
        expiresAt: {type: string, format: date-time}
    APITokenCreated:
      allOf:
        - $ref: "#/components/schemas/APIToken"
        - type: object
          additionalProperties: false
          required: [secret]
          properties:
            secret: {type: string, minLength: 32, maxLength: 256}
    APITokenListResponse:
      type: object
      additionalProperties: false
      required: [tokens]
      properties:
        tokens:
          type: array
          items: {$ref: "#/components/schemas/APIToken"}
    Share:
      type: object
      additionalProperties: false
      required: [id, createdBy, scopeKind, scopeId, permissions, secretPrefix, createdAt, expiresAt, revoked]
      properties:
        id: {$ref: "#/components/schemas/ShareId"}
        createdBy: {type: string}
        scopeKind: {type: string, enum: [library, work, media]}
        scopeId: {type: string, minLength: 1, maxLength: 128}
        permissions:
          type: array
          minItems: 1
          items: {type: string, enum: [view, download]}
        secretPrefix: {type: string, minLength: 1, maxLength: 16}
        fixedBlobAlgorithm: {type: string, enum: [sha256-v1], nullable: true}
        fixedBlobDigest: {type: string, pattern: "^[0-9a-f]{64}$", nullable: true}
        createdAt: {type: string, format: date-time}
        expiresAt: {type: string, format: date-time}
        revoked: {type: boolean}
    ShareCreateRequest:
      type: object
      additionalProperties: false
      required: [scopeKind, scopeId, permissions, expiresAt]
      properties:
        scopeKind: {type: string, enum: [library, work, media]}
        scopeId: {type: string, minLength: 1, maxLength: 128}
        permissions:
          type: array
          minItems: 1
          uniqueItems: true
          items: {type: string, enum: [view, download]}
        fixedBlobAlgorithm:
          type: string
          enum: [sha256-v1]
          description: 仅 media scope 可用，且必须与创建时当前 publication 的已确认媒体 Blob 一致。
        fixedBlobDigest: {type: string, pattern: "^[0-9a-f]{64}$"}
        expiresAt: {type: string, format: date-time}
    ShareCreated:
      allOf:
        - $ref: "#/components/schemas/Share"
        - type: object
          additionalProperties: false
          required: [secret]
          properties:
            secret: {type: string, minLength: 32, maxLength: 256}
    ShareListResponse:
      type: object
      additionalProperties: false
      required: [shares]
      properties:
        shares:
          type: array
          items: {$ref: "#/components/schemas/Share"}
    PublicShareResource:
      type: object
      additionalProperties: false
      required: [scopeKind, scopeId, permissions, expiresAt, fixed]
      properties:
        scopeKind: {type: string, enum: [library, work, media]}
        scopeId: {type: string, minLength: 1, maxLength: 128}
        permissions:
          type: array
          minItems: 1
          uniqueItems: true
          items: {type: string, enum: [view, download]}
        expiresAt: {type: string, format: date-time}
        fixed: {type: boolean}
        queryPublicationId:
          allOf: [{$ref: "#/components/schemas/QueryPublicationId"}]
          nullable: true
        library:
          allOf: [{$ref: "#/components/schemas/Library"}]
          nullable: true
        work:
          allOf: [{$ref: "#/components/schemas/PublishedWork"}]
          nullable: true
        media:
          allOf: [{$ref: "#/components/schemas/PublishedMedia"}]
          nullable: true
        mediaItems:
          type: array
          items: {$ref: "#/components/schemas/PublishedMedia"}
        fixedBlob:
          allOf: [{$ref: "#/components/schemas/PublicSharedBlob"}]
          nullable: true
    PublicSharedBlob:
      type: object
      additionalProperties: false
      required: [algorithm, digest, sizeBytes, mimeType]
      properties:
        algorithm: {type: string, enum: [sha256-v1]}
        digest: {type: string, pattern: "^[0-9a-f]{64}$"}
        sizeBytes: {type: integer, format: int64, minimum: 0}
        mimeType: {type: string, minLength: 1, maxLength: 255}
    SecurityAudit:
      type: object
      additionalProperties: false
      required: [id, action, actorId, targetKind, targetId, outcome, detail, createdAt]
      properties:
        id: {type: string}
        action: {type: string}
        actorId: {type: string}
        targetKind: {type: string}
        targetId: {type: string}
        outcome: {type: string}
        detail: {type: object, additionalProperties: true}
        createdAt: {type: string, format: date-time}
    SecurityAuditListResponse:
      type: object
      additionalProperties: false
      required: [audits]
      properties:
        audits:
          type: array
          items: {$ref: "#/components/schemas/SecurityAudit"}
    LibraryId:
      type: string
      pattern: "^lib_[0-9a-f]{8}-[0-9a-f]{4}-7[0-9a-f]{3}-[89ab][0-9a-f]{3}-[0-9a-f]{12}$"
    SourceId:
      type: string
      pattern: "^src_[0-9a-f]{8}-[0-9a-f]{4}-7[0-9a-f]{3}-[89ab][0-9a-f]{3}-[0-9a-f]{12}$"
    CanonicalWorkId:
      type: string
      pattern: "^wrk_[0-9a-f]{8}-[0-9a-f]{4}-7[0-9a-f]{3}-[89ab][0-9a-f]{3}-[0-9a-f]{12}$"
    CanonicalCreatorId:
      type: string
      pattern: "^ctr_[0-9a-f]{8}-[0-9a-f]{4}-7[0-9a-f]{3}-[89ab][0-9a-f]{3}-[0-9a-f]{12}$"
    CanonicalMediaId:
      type: string
      pattern: "^med_[0-9a-f]{8}-[0-9a-f]{4}-7[0-9a-f]{3}-[89ab][0-9a-f]{3}-[0-9a-f]{12}$"
    SourceRuleBindingId:
      type: string
      pattern: "^srb_[0-9a-f]{8}-[0-9a-f]{4}-7[0-9a-f]{3}-[89ab][0-9a-f]{3}-[0-9a-f]{12}$"
    JobId:
      type: string
      pattern: "^job_[0-9a-f]{8}-[0-9a-f]{4}-7[0-9a-f]{3}-[89ab][0-9a-f]{3}-[0-9a-f]{12}$"
    QueryPublicationId:
      type: string
      pattern: "^qpub_[0-9a-f]{8}-[0-9a-f]{4}-7[0-9a-f]{3}-[89ab][0-9a-f]{3}-[0-9a-f]{12}$"
    CreatorMergeId:
      type: string
      pattern: "^cmrg_[0-9a-f]{8}-[0-9a-f]{4}-7[0-9a-f]{3}-[89ab][0-9a-f]{3}-[0-9a-f]{12}$"
    BindingIssueId:
      type: string
      pattern: "^biss_[0-9a-f]{8}-[0-9a-f]{4}-7[0-9a-f]{3}-[89ab][0-9a-f]{3}-[0-9a-f]{12}$"
    ContentBlobRef:
      type: object
      additionalProperties: false
      required: [algorithm, digest]
      properties:
        algorithm:
          type: string
          enum: [sha256-v1]
        digest:
          type: string
          pattern: "^[0-9a-f]{64}$"
    FileLocationRef:
      type: object
      additionalProperties: false
      required: [sourceId, identityVersion, locationKey]
      properties:
        sourceId:
          $ref: "#/components/schemas/SourceId"
        identityVersion:
          type: integer
          minimum: 1
          maximum: 65535
        locationKey:
          type: string
          minLength: 1
          maxLength: 4096
security:
  - sessionCookie: []
  - apiToken: []
