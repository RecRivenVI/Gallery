        "404":
          $ref: "#/components/responses/NotFoundError"
    put:
      operationId: putWorkOverlay
      summary: 同步替换 Overlay fact，并在查询语义变化时排队异步 projection
      parameters:
        - name: workId
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/CanonicalWorkId"
        - $ref: "#/components/parameters/CSRFHeader"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/WorkOverlayPutRequest"
      responses:
        "200":
          description: fact 已同步持久化；projectionStatus 表明查询投影进度
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WorkOverlayState"
        "400":
          $ref: "#/components/responses/ValidationError"
        "401":
          $ref: "#/components/responses/UnauthenticatedError"
        "403":
          $ref: "#/components/responses/ForbiddenError"
        "404":
          $ref: "#/components/responses/NotFoundError"
  /api/v1/works/{workId}/media:
    get:
      operationId: listWorkMedia
      summary: 查询作品的媒体
      description: >-
        省略 queryPublicationId 为 current 模式，读当前 active publication，响应
        queryPublicationId 字段返回实际使用的快照 ID。显式提供 queryPublicationId 为
        snapshot 模式，只从该 publication 解析，媒体必须属于该快照中的这个作品，
        publication 不存在或已过期返回 409 CURSOR_EXPIRED，不静默回退到 active。
      parameters:
        - name: workId
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/CanonicalWorkId"
        - name: queryPublicationId
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/QueryPublicationId"
      responses:
        "200":
          description: MediaProjection 列表
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MediaListResponse"
        "401":
          $ref: "#/components/responses/UnauthenticatedError"
        "403":
          $ref: "#/components/responses/ForbiddenError"
        "404":
          $ref: "#/components/responses/NotFoundError"
        "409":
          $ref: "#/components/responses/ConflictError"
  /api/v1/media/{mediaId}:
    get:
      operationId: getMedia
      summary: 读取稳定 Media ID 对应的 MediaProjection
      description: >-
        省略 queryPublicationId 为 current 模式；显式提供为 snapshot 模式，语义同
        listWorkMedia。
      parameters:
        - name: mediaId
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/CanonicalMediaId"
        - name: queryPublicationId
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/QueryPublicationId"
      responses:
        "200":
          description: MediaProjection
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PublishedMedia"
        "401":
          $ref: "#/components/responses/UnauthenticatedError"
        "403":
          $ref: "#/components/responses/ForbiddenError"
        "404":
          $ref: "#/components/responses/NotFoundError"
        "409":
          $ref: "#/components/responses/ConflictError"
  /api/v1/media/{mediaId}/content:
    parameters:
      - name: mediaId
        in: path
        required: true
        schema:
          $ref: "#/components/schemas/CanonicalMediaId"
      - name: queryPublicationId
        in: query
        required: false
        description: >-
          省略为 current 模式；显式提供为 snapshot 模式，只从该 publication 解析并读取
          该快照下的 ContentBlob，语义同 listWorkMedia。
        schema:
          $ref: "#/components/schemas/QueryPublicationId"
      - name: Range
        in: header
        required: false
        schema:
          type: string
      - name: If-None-Match
        in: header
        required: false
        schema:
          type: string
      - name: If-Range
        in: header
        required: false
        description: >-
          与当前 ETag 不一致时忽略 Range，退回完整 200 响应，避免拼接不同内容版本的字节。
        schema:
          type: string
    head:
      operationId: headMediaContent
      summary: 读取稳定 Media ID 内容的 HTTP metadata
      responses:
        "200":
          description: 完整内容 metadata
          headers:
            Accept-Ranges: {schema: {type: string, enum: [bytes]}}
            Content-Length: {schema: {type: integer, format: int64}}
            ETag: {schema: {type: string}}
        "206":
          description: 单区间 metadata
          headers:
            Accept-Ranges: {schema: {type: string, enum: [bytes]}}
            Content-Length: {schema: {type: integer, format: int64}}
            Content-Range: {schema: {type: string}}
            ETag: {schema: {type: string}}
        "304":
          description: ETag 未变化
        "401": {$ref: "#/components/responses/UnauthenticatedError"}
        "403": {$ref: "#/components/responses/ForbiddenError"}
        "404": {$ref: "#/components/responses/NotFoundError"}
        "409": {$ref: "#/components/responses/ConflictError"}
        "416": {$ref: "#/components/responses/RangeError"}
        "503": {$ref: "#/components/responses/MediaOfflineError"}
    get:
      operationId: getMediaContent
      summary: 完整或单区间读取稳定 Media ID 内容
      responses:
        "200":
          description: 完整内容
          headers:
            Accept-Ranges: {schema: {type: string, enum: [bytes]}}
            Content-Length: {schema: {type: integer, format: int64}}
            ETag: {schema: {type: string}}
          content:
            application/octet-stream:
              schema: {type: string, format: binary}
        "206":
          description: 单区间内容
          headers:
            Accept-Ranges: {schema: {type: string, enum: [bytes]}}
            Content-Length: {schema: {type: integer, format: int64}}
            Content-Range: {schema: {type: string}}
            ETag: {schema: {type: string}}
          content:
            application/octet-stream:
              schema: {type: string, format: binary}
        "304":
          description: ETag 未变化
        "401": {$ref: "#/components/responses/UnauthenticatedError"}
        "403": {$ref: "#/components/responses/ForbiddenError"}
        "404": {$ref: "#/components/responses/NotFoundError"}
        "409": {$ref: "#/components/responses/ConflictError"}
        "416": {$ref: "#/components/responses/RangeError"}
        "503": {$ref: "#/components/responses/MediaOfflineError"}
  /api/v1/media/{mediaId}/verification-jobs:
    post:
      operationId: createMediaVerificationJob
      summary: 为 located_unverified 媒体按需建立内容确认 Job
      description: >-
        返回持久 Job 而不是同步阻塞计算完整 SHA-256。只强制该媒体重新完整哈希，不再
        触发整个 Source 的 verify 档案，同 Source 其余媒体继续按既有 incremental 规则
        处理。幂等键按实际使用的 queryPublicationId、媒体 ID、Source、相对路径与
        observation 指纹（size、mtime、内容确认状态）派生，文件未变化且针对同一快照
        的重复请求复用同一 Job。媒体已是 content_verified 时返回 409。按需确认是
        "当前 publication 操作"：显式提供的 queryPublicationId 必须等于当前 active
        publication，仍存在但已经不是 active 的历史 publication 同样返回 409，不创建
        Job。
      parameters:
        - name: mediaId
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/CanonicalMediaId"
        - name: queryPublicationId
          in: query
          required: false
          description: >-
            省略为 current 模式，解析当前 active publication；显式提供时必须精确等于
            当前 active publication，否则返回 409（按需确认不支持针对历史快照重新
            确认）。
          schema:
            $ref: "#/components/schemas/QueryPublicationId"
        - $ref: "#/components/parameters/CSRFHeader"
      responses:
        "202":
          description: 内容确认 Job 已排队或复用既有同 observation Job
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Job"
        "401":
          $ref: "#/components/responses/UnauthenticatedError"
        "403":
          $ref: "#/components/responses/ForbiddenError"
        "404":
          $ref: "#/components/responses/NotFoundError"
        "409":
          $ref: "#/components/responses/ConflictError"
  /api/v1/media/{mediaId}/derived-assets:
    post:
      operationId: createDerivedAsset
      summary: 请求生成或复用一个 DerivedAsset（当前仅受限 JPEG 缩略图 transform）
      description: >-
        总是返回持久 Job；缓存命中时 Job 立即以 completed 态返回。媒体尚未
        content_verified 时返回 409；未知或不支持的 transformId/transformVersion 返回
        400；外部 Resolver 未配置（Available()=false）时返回 503。输入 ContentBlob 从
        请求指定（或省略时当前 active）的 queryPublicationId 解析并冻结，不会在异步
        生成期间改用之后的 active publication。需要 media.derive capability，只读
        media.read 账户不能创建生成 Job。
      parameters:
        - name: mediaId
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/CanonicalMediaId"
        - name: queryPublicationId
          in: query
          required: false
          description: 省略为 current 模式；显式提供时输入 ContentBlob 从该快照解析。
          schema:
            $ref: "#/components/schemas/QueryPublicationId"
        - $ref: "#/components/parameters/CSRFHeader"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DerivedAssetCreateRequest"
      responses:
        "202":
          description: DerivedAsset Job 已排队或命中缓存
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Job"
        "400":
          $ref: "#/components/responses/ValidationError"
        "401":
          $ref: "#/components/responses/UnauthenticatedError"
        "403":
          $ref: "#/components/responses/ForbiddenError"
        "404":
          $ref: "#/components/responses/NotFoundError"
        "409":
          $ref: "#/components/responses/ConflictError"
  /api/v1/derived-assets/{assetKey}/content:
    get:
      operationId: getDerivedAssetContent
      summary: 读取已就绪 DerivedAsset 正文
      description: assetKey 是内容寻址 key（完整 SHA-256），不是 Catalog 内部 row ID；服务端先从注册事实解析输入 Blob，再按当前 publication occurrence 校验 media.read Source scope，授权后才建立文件读取租约。
      parameters:
        - name: assetKey
          in: path
          required: true
          schema:
            type: string
            pattern: "^[0-9a-f]{64}$"
        - name: If-None-Match
          in: header
          required: false
          schema:
            type: string
      responses:
        "200":
          description: DerivedAsset 正文
          headers:
            ETag: {schema: {type: string}}
            Content-Length: {schema: {type: integer, format: int64}}
          content:
            application/octet-stream:
              schema: {type: string, format: binary}
        "304":
          description: ETag 未变化
        "401":
          $ref: "#/components/responses/UnauthenticatedError"
        "403":
          $ref: "#/components/responses/ForbiddenError"
        "404":
          $ref: "#/components/responses/NotFoundError"
  /api/v1/creators:
    get:
      operationId: listCreators
      summary: 列出 CanonicalCreator 及其有效合并状态
      responses:
        "200":
          description: 全部 CanonicalCreator
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreatorListResponse"
        "401":
          $ref: "#/components/responses/UnauthenticatedError"
        "403":
          $ref: "#/components/responses/ForbiddenError"
  /api/v1/creators/{creatorId}:
    get:
      operationId: getCreator
      summary: 读取 CanonicalCreator 及其来源 Binding 证据
      parameters:
        - name: creatorId
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/CanonicalCreatorId"
      responses:
        "200":
          description: CanonicalCreator 与证据
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreatorDetail"
        "401":
          $ref: "#/components/responses/UnauthenticatedError"
        "403":
          $ref: "#/components/responses/ForbiddenError"
        "404":
          $ref: "#/components/responses/NotFoundError"
  /api/v1/creators/merges:
    get:
      operationId: listCreatorMerges
      summary: 列出创作者合并记录及其状态
      responses:
        "200":
          description: 合并记录
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreatorMergeListResponse"
        "401":
          $ref: "#/components/responses/UnauthenticatedError"
        "403":
          $ref: "#/components/responses/ForbiddenError"
    post:
      operationId: mergeCreators
      summary: 将若干 CanonicalCreator 合并进一个 target 并排队查询投影
      parameters:
        - $ref: "#/components/parameters/CSRFHeader"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreatorMergeRequest"
      responses:
        "201":
          description: 合并已记录；projectionJobId 表明查询投影进度
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreatorMerge"
        "400":
          $ref: "#/components/responses/ValidationError"
        "401":
          $ref: "#/components/responses/UnauthenticatedError"
        "403":
          $ref: "#/components/responses/ForbiddenError"
        "404":
          $ref: "#/components/responses/NotFoundError"
        "409":
          $ref: "#/components/responses/ConflictError"
  /api/v1/creators/merges/{mergeId}:
    delete:
      operationId: undoCreatorMerge
      summary: 撤销一次创作者合并并排队查询投影恢复
      parameters:
        - name: mergeId
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/CreatorMergeId"
        - $ref: "#/components/parameters/CSRFHeader"
      responses:
        "200":
          description: 合并已撤销；projectionJobId 表明恢复投影进度
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreatorMerge"
        "401":
          $ref: "#/components/responses/UnauthenticatedError"
        "403":
          $ref: "#/components/responses/ForbiddenError"
        "404":
          $ref: "#/components/responses/NotFoundError"
        "409":
          $ref: "#/components/responses/ConflictError"
  /api/v1/binding-issues:
    get:
      operationId: listBindingIssues
      summary: 按 Source、实体类型和状态过滤并 keyset 分页列出 Binding issue
      parameters:
        - {name: sourceId, in: query, required: false, schema: {$ref: "#/components/schemas/SourceId"}}
        - {name: entityType, in: query, required: false, schema: {type: string, enum: [work, creator, media]}}
        - {name: status, in: query, required: false, schema: {type: string, enum: [open, resolved, dismissed, superseded, stale]}}
        - {name: cursor, in: query, required: false, schema: {type: string, maxLength: 4096}}
        - {name: limit, in: query, required: false, schema: {type: integer, minimum: 1, maximum: 200, default: 50}}
      responses:
        "200":
          description: Binding issue 列表
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BindingIssueListResponse"
        "400":
          $ref: "#/components/responses/ValidationError"
        "401":
          $ref: "#/components/responses/UnauthenticatedError"
        "403":
          $ref: "#/components/responses/ForbiddenError"
  /api/v1/binding-issues/{issueId}:
    get:
      operationId: getBindingIssue
      summary: 读取单个 Binding issue 及其候选证据
      parameters:
        - name: issueId
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/BindingIssueId"
      responses:
        "200":
          description: Binding issue 与候选证据
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BindingIssue"
        "401":
          $ref: "#/components/responses/UnauthenticatedError"
        "403":
          $ref: "#/components/responses/ForbiddenError"
        "404":
          $ref: "#/components/responses/NotFoundError"
  /api/v1/binding-issues/{issueId}/resolve:
    post:
      operationId: resolveBindingIssue
      summary: 人工修复 Binding issue（绑定候选或创建新实体），下一次扫描据此重建
      parameters:
        - name: issueId
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/BindingIssueId"
        - $ref: "#/components/parameters/CSRFHeader"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BindingIssueResolveRequest"
      responses:
        "200":
          description: 修复已记录
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BindingIssue"
        "400":
          $ref: "#/components/responses/ValidationError"
        "401":
          $ref: "#/components/responses/UnauthenticatedError"
        "403":
          $ref: "#/components/responses/ForbiddenError"
        "404":
          $ref: "#/components/responses/NotFoundError"
        "409":
          $ref: "#/components/responses/ConflictError"
  /api/v1/binding-issues/{issueId}/dismiss:
    post:
      operationId: dismissBindingIssue
      summary: 忽略/延后 Binding issue，抑制相同证据重复产生
      parameters:
        - name: issueId
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/BindingIssueId"
        - $ref: "#/components/parameters/CSRFHeader"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BindingIssueVersionRequest"
      responses:
        "200":
          description: 已忽略
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BindingIssue"
        "400":
          $ref: "#/components/responses/ValidationError"
        "401":
          $ref: "#/components/responses/UnauthenticatedError"
        "403":
          $ref: "#/components/responses/ForbiddenError"
        "404":
          $ref: "#/components/responses/NotFoundError"
        "409":
          $ref: "#/components/responses/ConflictError"
  /api/v1/binding-issues/{issueId}/reopen:
    post:
      operationId: reopenBindingIssue
      summary: 重新打开被忽略、过时或被替代的 Binding issue
      parameters:
        - name: issueId
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/BindingIssueId"
        - $ref: "#/components/parameters/CSRFHeader"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BindingIssueVersionRequest"
      responses:
        "200":
          description: 已重新打开
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BindingIssue"
        "400":
          $ref: "#/components/responses/ValidationError"
        "401":
          $ref: "#/components/responses/UnauthenticatedError"
        "403":
          $ref: "#/components/responses/ForbiddenError"
        "404":
          $ref: "#/components/responses/NotFoundError"
        "409":
          $ref: "#/components/responses/ConflictError"
  /api/v1/binding-issues/{issueId}/resolve-structure:
    post:
      operationId: resolveSourceStructureIssue
      summary: 对 SourceWork 拆分或合并审查 issue 应用人工决策，以 pre-seed Binding 表达，不改写 Canonical 用户事实
      parameters:
        - name: issueId
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/BindingIssueId"
        - $ref: "#/components/parameters/CSRFHeader"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SourceStructureDecisionRequest"
      responses:
        "200":
          description: 决策结果
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SourceStructureDecision"
        "400":
          $ref: "#/components/responses/ValidationError"
        "401":
          $ref: "#/components/responses/UnauthenticatedError"
        "403":
          $ref: "#/components/responses/ForbiddenError"
        "404":
          $ref: "#/components/responses/NotFoundError"
        "409":
          $ref: "#/components/responses/ConflictError"
  /api/v1/source-structure-decisions:
    get:
      operationId: listSourceStructureDecisions
      summary: 列出 SourceWork 拆分/合并人工决策记录
      parameters:
        - {name: sourceId, in: query, required: false, schema: {$ref: "#/components/schemas/SourceId"}}
        - {name: status, in: query, required: false, schema: {type: string, enum: [applied, undone]}}
        - {name: limit, in: query, required: false, schema: {type: integer, minimum: 1, maximum: 200, default: 50}}
      responses:
        "200":
          description: 决策列表
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SourceStructureDecisionListResponse"
        "400":
          $ref: "#/components/responses/ValidationError"
        "401":
          $ref: "#/components/responses/UnauthenticatedError"
        "403":
          $ref: "#/components/responses/ForbiddenError"
  /api/v1/source-structure-decisions/{decisionId}:
    get:
      operationId: getSourceStructureDecision
      summary: 读取单条 SourceWork 拆分/合并决策
      parameters:
        - name: decisionId
          in: path
          required: true
          schema:
            type: string
            minLength: 1
            maxLength: 128
      responses:
        "200":
          description: 决策
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SourceStructureDecision"
        "401":
          $ref: "#/components/responses/UnauthenticatedError"
        "403":
          $ref: "#/components/responses/ForbiddenError"
        "404":
          $ref: "#/components/responses/NotFoundError"
  /api/v1/source-structure-decisions/{decisionId}/undo:
    post:
      operationId: undoSourceStructureDecision
      summary: 撤回尚未被扫描消费的拆分/合并决策
      description: >-
        这是「撤回尚未应用的结构决策」，不是对已生效结构变化的完整反向操作。仅当决策的 pre-seed Binding
        尚未被下一次扫描消费（新 source_key 尚未产生 active Binding）时才清除 pre-seed Binding 并重开审查
        issue；一旦决策已被扫描消费并产生实际 Binding（可能已有 Overlay/Favorite/Progress 依赖），返回稳定
        CONFLICT 且不部分修改决策、issue 或 Binding。若需反转已生效的结构变化，应通过新的人工决策或未来补偿
        流程处理。
      parameters:
        - name: decisionId
          in: path
          required: true
          schema:
            type: string
            minLength: 1
            maxLength: 128
        - $ref: "#/components/parameters/CSRFHeader"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BindingIssueVersionRequest"
      responses:
        "200":
          description: 已撤回（决策标记 undone、pre-seed Binding 清除、审查 issue 重开）
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SourceStructureDecision"
        "400":
          $ref: "#/components/responses/ValidationError"
        "401":
          $ref: "#/components/responses/UnauthenticatedError"
        "403":
          $ref: "#/components/responses/ForbiddenError"
        "404":
          $ref: "#/components/responses/NotFoundError"
        "409":
          $ref: "#/components/responses/ConflictError"
  /api/v1/binding-actions/unbind-work:
    post:
      operationId: unbindWork
      summary: 手动解绑 SourceWork，下一次扫描将其拆分为新的 CanonicalWork
      parameters:
        - $ref: "#/components/parameters/CSRFHeader"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BindingUnbindRequest"
      responses:
        "200":
          description: 已解绑
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BindingActionResult"
        "400":
          $ref: "#/components/responses/ValidationError"
        "401":
          $ref: "#/components/responses/UnauthenticatedError"
        "403":
          $ref: "#/components/responses/ForbiddenError"
        "404":
          $ref: "#/components/responses/NotFoundError"
  /api/v1/binding-actions/unbind-media:
    post:
      operationId: unbindMedia
      summary: 手动解绑 SourceMedia，下一次扫描建立新的 CanonicalMedia occurrence
      parameters:
        - $ref: "#/components/parameters/CSRFHeader"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BindingUnbindRequest"
      responses:
        "200":
          description: 已解绑
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BindingActionResult"
        "400":
          $ref: "#/components/responses/ValidationError"
        "401":
          $ref: "#/components/responses/UnauthenticatedError"
        "403":
          $ref: "#/components/responses/ForbiddenError"
        "404":
          $ref: "#/components/responses/NotFoundError"
  /api/v1/binding-actions/undo-unbind:
    post:
      operationId: undoManualUnbind
      summary: 撤销一次手动 Work 解绑，恢复原 Binding
      parameters:
        - $ref: "#/components/parameters/CSRFHeader"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BindingUnbindRequest"
      responses:
        "200":
          description: 已撤销
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BindingActionResult"
        "400":
          $ref: "#/components/responses/ValidationError"
        "401":
          $ref: "#/components/responses/UnauthenticatedError"
        "403":
          $ref: "#/components/responses/ForbiddenError"
        "404":
          $ref: "#/components/responses/NotFoundError"
        "409":
          $ref: "#/components/responses/ConflictError"
  /api/v1/orphan-candidates:
    get:
      operationId: listOrphanCandidates
      summary: 列出到达保留窗口、等待人工审查的 orphan candidate Binding
      parameters:
        - {name: sourceId, in: query, required: false, schema: {$ref: "#/components/schemas/SourceId"}}
        - {name: entityType, in: query, required: false, schema: {type: string, enum: [work, creator, media]}}
        - {name: cursor, in: query, required: false, schema: {type: string, maxLength: 4096}}
        - {name: limit, in: query, required: false, schema: {type: integer, minimum: 1, maximum: 200, default: 50}}
      responses:
        "200":
          description: orphan candidate 列表
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OrphanCandidateListResponse"
        "400":
          $ref: "#/components/responses/ValidationError"
        "401":
          $ref: "#/components/responses/UnauthenticatedError"
        "403":
          $ref: "#/components/responses/ForbiddenError"
  /api/v1/orphan-candidates/{bindingId}/decide:
    post:
      operationId: decideOrphanCandidate
      summary: 对 orphan candidate 应用保留、延长、确认孤立或解绑决策，不删除 Canonical 与用户事实
      parameters:
        - name: bindingId
          in: path
          required: true
          schema:
            type: string
            minLength: 1
            maxLength: 128
        - $ref: "#/components/parameters/CSRFHeader"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/OrphanDecisionRequest"
      responses:
        "200":
          description: 决策结果
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OrphanDecisionResult"
        "400":
          $ref: "#/components/responses/ValidationError"
        "401":
          $ref: "#/components/responses/UnauthenticatedError"
        "403":
          $ref: "#/components/responses/ForbiddenError"
        "404":
          $ref: "#/components/responses/NotFoundError"
        "409":
          $ref: "#/components/responses/ConflictError"
components:
  securitySchemes:
    sessionCookie:
      type: apiKey
      in: cookie
      name: gallery_session
    apiToken:
      type: http
      scheme: bearer
  parameters:
    CSRFHeader:
      name: X-Gallery-CSRF
      in: header
      required: true
      schema:
        type: string
        minLength: 32
        maxLength: 256
    IdempotencyKey:
      name: Idempotency-Key
      in: header
      required: false
      schema:
        type: string
        minLength: 1
        maxLength: 256
    IfMatch:
      name: If-Match
      in: header
      required: false
      schema:
        type: string
        pattern: '^"?[0-9]+"?$'
  responses:
    InternalError:
      description: 内部失败；不返回堆栈、路径或数据库文本
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorEnvelope"
    UnauthenticatedError:
      description: Session 无效、过期或已吊销
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorEnvelope"
    ForbiddenError:
      description: capability、请求来源或 CSRF 校验失败
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorEnvelope"
    RateLimitedError:
      description: 登录尝试超过有界速率限制
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorEnvelope"
    NotFoundError:
      description: 资源不存在或当前主体不可见
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorEnvelope"
    ValidationError:
      description: 请求字段、路径或规则校验失败
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorEnvelope"
    ConflictError:
      description: 资源或同类操作冲突
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorEnvelope"
    RangeError:
      description: Range 无效或不支持多区间
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorEnvelope"
    MediaOfflineError:
      description: 当前 publication 中的媒体位置暂不可用
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorEnvelope"
  schemas:
    HealthResponse:
      type: object
      additionalProperties: false
      required: [status, apiVersion, databases]
      properties:
        status:
          type: string
          enum: [ok]
        apiVersion:
          type: string
          enum: [v1]
        databases:
          type: object
          additionalProperties: false
          required: [control, catalog]
          properties:
            control:
              type: string
              enum: [ok]
            catalog:
              type: string
              enum: [ok]
    BootstrapResponse:
      type: object
      additionalProperties: false
      required:
        - mode
        - lanInitialized
        - authenticated
        - availableCapabilities
        - effectiveCapabilities
        - csrfToken
        - apiVersion
        - websocketProtocolVersion
        - sortProtocolVersion
        - ruleSchemaVersion
      properties:
        mode:
          type: string
          enum: [personal, lan]
        authenticated:
          type: boolean
        lanInitialized:
          type: boolean
        availableCapabilities:
          type: array
          items:
            type: string
        principalId:
          type: string
          nullable: true
        effectiveCapabilities:
          type: array
          items:
            type: string
        csrfToken:
          type: string
          minLength: 32
          maxLength: 256
        apiVersion:
          type: string
          enum: [v1]
        websocketProtocolVersion:
          type: integer
          enum: [1]
        sortProtocolVersion:
          type: integer
