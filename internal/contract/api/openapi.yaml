openapi: 3.0.3
info:
  title: Gallery API
  version: 0.2.0-walking-skeleton
  description: Gallery Walking Skeleton 正式契约；尚未冻结完整 v1 资源面。
servers:
  - url: http://127.0.0.1:{port}
    variables:
      port:
        default: "8080"
paths:
  /api/v1/health:
    get:
      operationId: getHealth
      summary: 读取服务与两库健康状态
      security: []
      responses:
        "200":
          description: 服务可用
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthResponse"
        "500":
          $ref: "#/components/responses/InternalError"
  /api/v1/bootstrap:
    get:
      operationId: getBootstrap
      summary: 读取部署模式、协议版本和当前主体能力
      security: []
      responses:
        "200":
          description: Bootstrap snapshot
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BootstrapResponse"
        "500":
          $ref: "#/components/responses/InternalError"
  /api/v1/personal/pairing-attempts:
    post:
      operationId: createPairingAttempt
      summary: 创建短时、单次使用的 Personal 配对凭据
      security: []
      parameters:
        - $ref: "#/components/parameters/CSRFHeader"
      responses:
        "201":
          description: 配对凭据已创建；凭据只在本响应出现
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PairingAttemptResponse"
        "403":
          $ref: "#/components/responses/ForbiddenError"
  /api/v1/personal/pair:
    post:
      operationId: exchangePairingCredential
      summary: 单次消费配对凭据并建立 HttpOnly Session
      security: []
      parameters:
        - $ref: "#/components/parameters/CSRFHeader"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PairingExchangeRequest"
      responses:
        "201":
          description: Session 已建立
          headers:
            Set-Cookie:
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SessionEstablishedResponse"
        "401":
          $ref: "#/components/responses/UnauthenticatedError"
        "403":
          $ref: "#/components/responses/ForbiddenError"
  /api/v1/sessions:
    get:
      operationId: listSessions
      summary: 列出服务端 Session
      responses:
        "200":
          description: Session 列表
          content:
            application/json:
              schema:
                type: object
                additionalProperties: false
                required: [sessions]
                properties:
                  sessions:
                    type: array
                    items:
                      $ref: "#/components/schemas/SessionSummary"
        "401":
          $ref: "#/components/responses/UnauthenticatedError"
        "403":
          $ref: "#/components/responses/ForbiddenError"
  /api/v1/sessions/{sessionId}:
    delete:
      operationId: revokeSession
      summary: 吊销指定 Session
      parameters:
        - name: sessionId
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/SessionId"
        - $ref: "#/components/parameters/CSRFHeader"
      responses:
        "204":
          description: Session 已吊销
        "401":
          $ref: "#/components/responses/UnauthenticatedError"
        "403":
          $ref: "#/components/responses/ForbiddenError"
        "404":
          $ref: "#/components/responses/NotFoundError"
  /api/v1/libraries:
    post:
      operationId: createLibrary
      summary: 创建 Library
      parameters:
        - $ref: "#/components/parameters/CSRFHeader"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LibraryCreateRequest"
      responses:
        "201":
          description: Library 已创建
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Library"
        "400":
          $ref: "#/components/responses/ValidationError"
        "401":
          $ref: "#/components/responses/UnauthenticatedError"
        "403":
          $ref: "#/components/responses/ForbiddenError"
  /api/v1/libraries/{libraryId}:
    get:
      operationId: getLibrary
      summary: 读取 Library
      parameters:
        - name: libraryId
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/LibraryId"
      responses:
        "200":
          description: Library
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Library"
        "401":
          $ref: "#/components/responses/UnauthenticatedError"
        "403":
          $ref: "#/components/responses/ForbiddenError"
        "404":
          $ref: "#/components/responses/NotFoundError"
  /api/v1/sources:
    post:
      operationId: createSource
      summary: 注册严格只读 Source
      parameters:
        - $ref: "#/components/parameters/CSRFHeader"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SourceCreateRequest"
      responses:
        "201":
          description: Source 已注册
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Source"
        "400":
          $ref: "#/components/responses/ValidationError"
        "401":
          $ref: "#/components/responses/UnauthenticatedError"
        "403":
          $ref: "#/components/responses/ForbiddenError"
        "409":
          $ref: "#/components/responses/ConflictError"
  /api/v1/sources/{sourceId}:
    get:
      operationId: getSource
      summary: 读取不含绝对路径的 Source snapshot
      parameters:
        - name: sourceId
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/SourceId"
      responses:
        "200":
          description: Source
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Source"
        "401":
          $ref: "#/components/responses/UnauthenticatedError"
        "403":
          $ref: "#/components/responses/ForbiddenError"
        "404":
          $ref: "#/components/responses/NotFoundError"
  /api/v1/rules/validate:
    post:
      operationId: validateRulePackage
      summary: 实例化默认值、规范化并校验规则包
      parameters:
        - $ref: "#/components/parameters/CSRFHeader"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RuleValidateRequest"
      responses:
        "200":
          description: 规则包规范化和身份结果
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RuleValidationResult"
        "400": {$ref: "#/components/responses/ValidationError"}
        "401": {$ref: "#/components/responses/UnauthenticatedError"}
        "403": {$ref: "#/components/responses/ForbiddenError"}
  /api/v1/rules/compile:
    post:
      operationId: compileRulePackage
      summary: 编译冻结参数的 Rule IR
      parameters:
        - $ref: "#/components/parameters/CSRFHeader"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RuleCompileRequest"
      responses:
        "200":
          description: 编译结果和缓存命中状态
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RuleCompileResult"
        "400": {$ref: "#/components/responses/ValidationError"}
        "401": {$ref: "#/components/responses/UnauthenticatedError"}
        "403": {$ref: "#/components/responses/ForbiddenError"}
  /api/v1/rules/dry-run:
    post:
      operationId: dryRunRulePackage
      summary: 对显式合成输入执行规则并返回脱敏 Trace
      parameters:
        - $ref: "#/components/parameters/CSRFHeader"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RuleDryRunRequest"
      responses:
        "200":
          description: Dry Run 结果
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RuleDryRunResult"
        "400": {$ref: "#/components/responses/ValidationError"}
        "401": {$ref: "#/components/responses/UnauthenticatedError"}
        "403": {$ref: "#/components/responses/ForbiddenError"}
  /api/v1/rules/impact:
    post:
      operationId: analyzeRuleImpact
      summary: 静态比较两个规则包的重扫、投影、搜索和派生影响
      parameters:
        - $ref: "#/components/parameters/CSRFHeader"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RuleImpactRequest"
      responses:
        "200":
          description: RuleImpact
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RuleImpactResult"
        "400": {$ref: "#/components/responses/ValidationError"}
        "401": {$ref: "#/components/responses/UnauthenticatedError"}
        "403": {$ref: "#/components/responses/ForbiddenError"}
  /api/v1/rule-versions:
    post:
      operationId: createRuleVersion
      summary: 校验、规范化并编译不可变 RuleVersion
      parameters:
        - $ref: "#/components/parameters/CSRFHeader"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RuleVersionCreateRequest"
      responses:
        "201":
          description: RuleVersion 已创建或按 semantic hash 复用
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RuleVersion"
        "400":
          $ref: "#/components/responses/ValidationError"
        "401":
          $ref: "#/components/responses/UnauthenticatedError"
        "403":
          $ref: "#/components/responses/ForbiddenError"
        "409":
          $ref: "#/components/responses/ConflictError"
  /api/v1/rule-versions/{semanticHash}:
    get:
      operationId: getRuleVersion
      summary: 按运行语义身份读取 RuleVersion
      parameters:
        - name: semanticHash
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/SHA256Digest"
      responses:
        "200":
          description: RuleVersion
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RuleVersion"
        "401":
          $ref: "#/components/responses/UnauthenticatedError"
        "403":
          $ref: "#/components/responses/ForbiddenError"
        "404":
          $ref: "#/components/responses/NotFoundError"
  /api/v1/source-rule-bindings:
    post:
      operationId: createSourceRuleBinding
      summary: 绑定并冻结 Source 的 RuleVersion、参数和 Rule IR
      parameters:
        - $ref: "#/components/parameters/CSRFHeader"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SourceRuleBindingCreateRequest"
      responses:
        "201":
          description: SourceRuleBinding 已创建
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SourceRuleBinding"
        "400":
          $ref: "#/components/responses/ValidationError"
        "401":
          $ref: "#/components/responses/UnauthenticatedError"
        "403":
          $ref: "#/components/responses/ForbiddenError"
        "404":
          $ref: "#/components/responses/NotFoundError"
        "409":
          $ref: "#/components/responses/ConflictError"
  /api/v1/source-rule-bindings/{bindingId}:
    get:
      operationId: getSourceRuleBinding
      summary: 读取 SourceRuleBinding
      parameters:
        - name: bindingId
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/SourceRuleBindingId"
      responses:
        "200":
          description: SourceRuleBinding
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SourceRuleBinding"
        "401":
          $ref: "#/components/responses/UnauthenticatedError"
        "403":
          $ref: "#/components/responses/ForbiddenError"
        "404":
          $ref: "#/components/responses/NotFoundError"
  /api/v1/sources/{sourceId}/scan-jobs:
    post:
      operationId: createScanJob
      summary: 创建持久扫描 Job 并异步执行
      parameters:
        - name: sourceId
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/SourceId"
        - $ref: "#/components/parameters/CSRFHeader"
      responses:
        "202":
          description: 扫描 Job 已排队
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Job"
        "401":
          $ref: "#/components/responses/UnauthenticatedError"
        "403":
          $ref: "#/components/responses/ForbiddenError"
        "404":
          $ref: "#/components/responses/NotFoundError"
        "409":
          $ref: "#/components/responses/ConflictError"
  /api/v1/jobs/{jobId}:
    get:
      operationId: getJob
      summary: 读取持久 Job snapshot
      parameters:
        - name: jobId
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/JobId"
      responses:
        "200":
          description: Job snapshot
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Job"
        "401":
          $ref: "#/components/responses/UnauthenticatedError"
        "403":
          $ref: "#/components/responses/ForbiddenError"
        "404":
          $ref: "#/components/responses/NotFoundError"
  /api/v1/query-publications/current:
    get:
      operationId: getCurrentQueryPublication
      summary: 读取当前合法 query publication
      responses:
        "200":
          description: 当前 publication
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/QueryPublication"
        "401":
          $ref: "#/components/responses/UnauthenticatedError"
        "403":
          $ref: "#/components/responses/ForbiddenError"
        "404":
          $ref: "#/components/responses/NotFoundError"
  /api/v1/works:
    get:
      operationId: listWorks
      summary: 在合法双 revision publication 上搜索、过滤、排序和快照分页
      parameters:
        - {name: q, in: query, required: false, schema: {type: string, maxLength: 4096}}
        - {name: tag, in: query, required: false, schema: {type: string, maxLength: 512}}
        - {name: libraryId, in: query, required: false, schema: {$ref: "#/components/schemas/LibraryId"}}
        - {name: sourceId, in: query, required: false, schema: {$ref: "#/components/schemas/SourceId"}}
        - {name: sortDirection, in: query, required: false, schema: {type: string, enum: [asc, desc], default: asc}}
        - {name: limit, in: query, required: false, schema: {type: integer, minimum: 1, maximum: 200, default: 50}}
        - {name: cursor, in: query, required: false, schema: {type: string, maxLength: 16384}}
        - {name: queryPublicationId, in: query, required: false, schema: {$ref: "#/components/schemas/QueryPublicationId"}}
      responses:
        "200":
          description: 当前快照中的作品
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WorkListResponse"
        "400":
          $ref: "#/components/responses/ValidationError"
        "401":
          $ref: "#/components/responses/UnauthenticatedError"
        "403":
          $ref: "#/components/responses/ForbiddenError"
        "404":
          $ref: "#/components/responses/NotFoundError"
        "409":
          $ref: "#/components/responses/ConflictError"
  /api/v1/works/{workId}:
    get:
      operationId: getWork
      summary: 读取当前 publication 中的作品
      parameters:
        - name: workId
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/CanonicalWorkId"
      responses:
        "200":
          description: WorkProjection
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PublishedWork"
        "401":
          $ref: "#/components/responses/UnauthenticatedError"
        "403":
          $ref: "#/components/responses/ForbiddenError"
        "404":
          $ref: "#/components/responses/NotFoundError"
  /api/v1/works/{workId}/overlay:
    get:
      operationId: getWorkOverlay
      summary: 读取 control 中的用户事实及异步查询投影状态
      parameters:
        - name: workId
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/CanonicalWorkId"
      responses:
        "200":
          description: Overlay live state 与 projection 状态
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WorkOverlayState"
        "401":
          $ref: "#/components/responses/UnauthenticatedError"
        "403":
          $ref: "#/components/responses/ForbiddenError"
        "404":
          $ref: "#/components/responses/NotFoundError"
    put:
      operationId: putWorkOverlay
      summary: 同步替换 Overlay fact，并在查询语义变化时排队异步 projection
      parameters:
        - name: workId
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/CanonicalWorkId"
        - $ref: "#/components/parameters/CSRFHeader"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/WorkOverlayPutRequest"
      responses:
        "200":
          description: fact 已同步持久化；projectionStatus 表明查询投影进度
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WorkOverlayState"
        "400":
          $ref: "#/components/responses/ValidationError"
        "401":
          $ref: "#/components/responses/UnauthenticatedError"
        "403":
          $ref: "#/components/responses/ForbiddenError"
        "404":
          $ref: "#/components/responses/NotFoundError"
  /api/v1/works/{workId}/media:
    get:
      operationId: listWorkMedia
      summary: 查询当前 publication 中作品的媒体
      parameters:
        - name: workId
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/CanonicalWorkId"
      responses:
        "200":
          description: MediaProjection 列表
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MediaListResponse"
        "401":
          $ref: "#/components/responses/UnauthenticatedError"
        "403":
          $ref: "#/components/responses/ForbiddenError"
        "404":
          $ref: "#/components/responses/NotFoundError"
  /api/v1/media/{mediaId}:
    get:
      operationId: getMedia
      summary: 读取稳定 Media ID 对应的当前 MediaProjection
      parameters:
        - name: mediaId
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/CanonicalMediaId"
      responses:
        "200":
          description: MediaProjection
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PublishedMedia"
        "401":
          $ref: "#/components/responses/UnauthenticatedError"
        "403":
          $ref: "#/components/responses/ForbiddenError"
        "404":
          $ref: "#/components/responses/NotFoundError"
  /api/v1/media/{mediaId}/content:
    parameters:
      - name: mediaId
        in: path
        required: true
        schema:
          $ref: "#/components/schemas/CanonicalMediaId"
      - name: Range
        in: header
        required: false
        schema:
          type: string
      - name: If-None-Match
        in: header
        required: false
        schema:
          type: string
    head:
      operationId: headMediaContent
      summary: 读取稳定 Media ID 内容的 HTTP metadata
      responses:
        "200":
          description: 完整内容 metadata
          headers:
            Accept-Ranges: {schema: {type: string, enum: [bytes]}}
            Content-Length: {schema: {type: integer, format: int64}}
            ETag: {schema: {type: string}}
        "206":
          description: 单区间 metadata
          headers:
            Accept-Ranges: {schema: {type: string, enum: [bytes]}}
            Content-Length: {schema: {type: integer, format: int64}}
            Content-Range: {schema: {type: string}}
            ETag: {schema: {type: string}}
        "304":
          description: ETag 未变化
        "401": {$ref: "#/components/responses/UnauthenticatedError"}
        "403": {$ref: "#/components/responses/ForbiddenError"}
        "404": {$ref: "#/components/responses/NotFoundError"}
        "409": {$ref: "#/components/responses/ConflictError"}
        "416": {$ref: "#/components/responses/RangeError"}
        "503": {$ref: "#/components/responses/MediaOfflineError"}
    get:
      operationId: getMediaContent
      summary: 完整或单区间读取稳定 Media ID 内容
      responses:
        "200":
          description: 完整内容
          headers:
            Accept-Ranges: {schema: {type: string, enum: [bytes]}}
            Content-Length: {schema: {type: integer, format: int64}}
            ETag: {schema: {type: string}}
          content:
            application/octet-stream:
              schema: {type: string, format: binary}
        "206":
          description: 单区间内容
          headers:
            Accept-Ranges: {schema: {type: string, enum: [bytes]}}
            Content-Length: {schema: {type: integer, format: int64}}
            Content-Range: {schema: {type: string}}
            ETag: {schema: {type: string}}
          content:
            application/octet-stream:
              schema: {type: string, format: binary}
        "304":
          description: ETag 未变化
        "401": {$ref: "#/components/responses/UnauthenticatedError"}
        "403": {$ref: "#/components/responses/ForbiddenError"}
        "404": {$ref: "#/components/responses/NotFoundError"}
        "409": {$ref: "#/components/responses/ConflictError"}
        "416": {$ref: "#/components/responses/RangeError"}
        "503": {$ref: "#/components/responses/MediaOfflineError"}
  /api/v1/creators:
    get:
      operationId: listCreators
      summary: 列出 CanonicalCreator 及其有效合并状态
      responses:
        "200":
          description: 全部 CanonicalCreator
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreatorListResponse"
        "401":
          $ref: "#/components/responses/UnauthenticatedError"
        "403":
          $ref: "#/components/responses/ForbiddenError"
  /api/v1/creators/{creatorId}:
    get:
      operationId: getCreator
      summary: 读取 CanonicalCreator 及其来源 Binding 证据
      parameters:
        - name: creatorId
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/CanonicalCreatorId"
      responses:
        "200":
          description: CanonicalCreator 与证据
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreatorDetail"
        "401":
          $ref: "#/components/responses/UnauthenticatedError"
        "403":
          $ref: "#/components/responses/ForbiddenError"
        "404":
          $ref: "#/components/responses/NotFoundError"
  /api/v1/creators/merges:
    get:
      operationId: listCreatorMerges
      summary: 列出创作者合并记录及其状态
      responses:
        "200":
          description: 合并记录
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreatorMergeListResponse"
        "401":
          $ref: "#/components/responses/UnauthenticatedError"
        "403":
          $ref: "#/components/responses/ForbiddenError"
    post:
      operationId: mergeCreators
      summary: 将若干 CanonicalCreator 合并进一个 target 并排队查询投影
      parameters:
        - $ref: "#/components/parameters/CSRFHeader"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreatorMergeRequest"
      responses:
        "201":
          description: 合并已记录；projectionJobId 表明查询投影进度
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreatorMerge"
        "400":
          $ref: "#/components/responses/ValidationError"
        "401":
          $ref: "#/components/responses/UnauthenticatedError"
        "403":
          $ref: "#/components/responses/ForbiddenError"
        "404":
          $ref: "#/components/responses/NotFoundError"
        "409":
          $ref: "#/components/responses/ConflictError"
  /api/v1/creators/merges/{mergeId}:
    delete:
      operationId: undoCreatorMerge
      summary: 撤销一次创作者合并并排队查询投影恢复
      parameters:
        - name: mergeId
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/CreatorMergeId"
        - $ref: "#/components/parameters/CSRFHeader"
      responses:
        "200":
          description: 合并已撤销；projectionJobId 表明恢复投影进度
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreatorMerge"
        "401":
          $ref: "#/components/responses/UnauthenticatedError"
        "403":
          $ref: "#/components/responses/ForbiddenError"
        "404":
          $ref: "#/components/responses/NotFoundError"
        "409":
          $ref: "#/components/responses/ConflictError"
  /api/v1/binding-issues:
    get:
      operationId: listBindingIssues
      summary: 按 Source、实体类型和状态过滤并 keyset 分页列出 Binding issue
      parameters:
        - {name: sourceId, in: query, required: false, schema: {$ref: "#/components/schemas/SourceId"}}
        - {name: entityType, in: query, required: false, schema: {type: string, enum: [work, creator, media]}}
        - {name: status, in: query, required: false, schema: {type: string, enum: [open, resolved, dismissed, superseded, stale]}}
        - {name: cursor, in: query, required: false, schema: {type: string, maxLength: 4096}}
        - {name: limit, in: query, required: false, schema: {type: integer, minimum: 1, maximum: 200, default: 50}}
      responses:
        "200":
          description: Binding issue 列表
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BindingIssueListResponse"
        "400":
          $ref: "#/components/responses/ValidationError"
        "401":
          $ref: "#/components/responses/UnauthenticatedError"
        "403":
          $ref: "#/components/responses/ForbiddenError"
  /api/v1/binding-issues/{issueId}:
    get:
      operationId: getBindingIssue
      summary: 读取单个 Binding issue 及其候选证据
      parameters:
        - name: issueId
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/BindingIssueId"
      responses:
        "200":
          description: Binding issue 与候选证据
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BindingIssue"
        "401":
          $ref: "#/components/responses/UnauthenticatedError"
        "403":
          $ref: "#/components/responses/ForbiddenError"
        "404":
          $ref: "#/components/responses/NotFoundError"
components:
  securitySchemes:
    sessionCookie:
      type: apiKey
      in: cookie
      name: gallery_session
    apiToken:
      type: http
      scheme: bearer
  parameters:
    CSRFHeader:
      name: X-Gallery-CSRF
      in: header
      required: true
      schema:
        type: string
        minLength: 32
        maxLength: 256
  responses:
    InternalError:
      description: 内部失败；不返回堆栈、路径或数据库文本
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorEnvelope"
    UnauthenticatedError:
      description: Session 无效、过期或已吊销
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorEnvelope"
    ForbiddenError:
      description: capability、请求来源或 CSRF 校验失败
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorEnvelope"
    NotFoundError:
      description: 资源不存在或当前主体不可见
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorEnvelope"
    ValidationError:
      description: 请求字段、路径或规则校验失败
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorEnvelope"
    ConflictError:
      description: 资源或同类操作冲突
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorEnvelope"
    RangeError:
      description: Range 无效或不支持多区间
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorEnvelope"
    MediaOfflineError:
      description: 当前 publication 中的媒体位置暂不可用
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorEnvelope"
  schemas:
    HealthResponse:
      type: object
      additionalProperties: false
      required: [status, apiVersion, databases]
      properties:
        status:
          type: string
          enum: [ok]
        apiVersion:
          type: string
          enum: [v1]
        databases:
          type: object
          additionalProperties: false
          required: [control, catalog]
          properties:
            control:
              type: string
              enum: [ok]
            catalog:
              type: string
              enum: [ok]
    BootstrapResponse:
      type: object
      additionalProperties: false
      required:
        - mode
        - authenticated
        - availableCapabilities
        - effectiveCapabilities
        - csrfToken
        - apiVersion
        - websocketProtocolVersion
        - sortProtocolVersion
        - ruleSchemaVersion
      properties:
        mode:
          type: string
          enum: [personal, lan]
        authenticated:
          type: boolean
        availableCapabilities:
          type: array
          items:
            type: string
        principalId:
          type: string
          nullable: true
        effectiveCapabilities:
          type: array
          items:
            type: string
        csrfToken:
          type: string
          minLength: 32
          maxLength: 256
        apiVersion:
          type: string
          enum: [v1]
        websocketProtocolVersion:
          type: integer
          enum: [1]
        sortProtocolVersion:
          type: integer
          enum: [1]
        ruleSchemaVersion:
          type: integer
          enum: [1]
    ErrorEnvelope:
      type: object
      additionalProperties: false
      required: [error]
      properties:
        error:
          $ref: "#/components/schemas/ErrorDetail"
    ErrorDetail:
      type: object
      additionalProperties: false
      required: [code, retryable, correlationId]
      properties:
        code:
          $ref: "#/components/schemas/ErrorCode"
        retryable:
          type: boolean
        correlationId:
          type: string
          minLength: 1
          maxLength: 128
        field:
          type: string
          minLength: 1
          maxLength: 512
    ErrorCode:
      type: string
      enum:
        - INTERNAL_ERROR
        - VALIDATION_ERROR
        - CONFIG_INVALID
        - UNAUTHENTICATED
        - FORBIDDEN
        - NOT_FOUND
        - CONFLICT
        - APPDIRS_SOURCE_OVERLAP
        - SOURCE_ROOTS_OVERLAP
        - DATABASE_OPEN_FAILED
        - MIGRATION_FAILED
        - BACKUP_FAILED
        - CURSOR_INVALID
        - CURSOR_EXPIRED
        - QUERY_TOO_SHORT
        - OVERLAY_FACT_INVALID
        - OVERLAY_PROJECTION_FAILED
        - BINDING_REVIEW_REQUIRED
        - DERIVED_ASSET_INVALID
        - DERIVED_ASSET_FAILED
        - RULE_SCHEMA_INVALID
        - RULE_COMPILE_ERROR
        - RULE_CEL_LIMIT
        - RULE_DRY_RUN_FAILED
        - RULE_IMPACT_FAILED
        - RULE_EVAL_ERROR
        - CATALOG_PUBLICATION_MISSING
        - CONTENT_CHANGED_DURING_HASH
        - MEDIA_OFFLINE
        - HOST_REJECTED
        - ORIGIN_REJECTED
        - CSRF_INVALID
        - PAIRING_INVALID
        - PAIRING_EXPIRED
        - SOURCE_PATH_INVALID
        - RULE_PARAMETER_INVALID
        - JOB_STATE_CONFLICT
        - SCAN_ALREADY_RUNNING
        - SOURCE_UNAVAILABLE
        - SOURCE_READ_FAILED
        - CONTENT_DISAPPEARED
        - PATH_ESCAPE
        - CATALOG_CANDIDATE_INVALID
        - PROCESS_INTERRUPTED
        - RANGE_INVALID
    Job:
      type: object
      additionalProperties: false
      required: [id, type, status, stage, progress, attempt, createdAt, updatedAt]
      properties:
        id:
          $ref: "#/components/schemas/JobId"
        type:
          type: string
          enum: [scan, overlay_projection]
        sourceId:
          $ref: "#/components/schemas/SourceId"
        status:
          type: string
          enum: [queued, running, publishing, completed, failed, cancelled, needs_repair]
        stage:
          type: string
        progress:
          type: object
          additionalProperties: false
          required: [current, total, sequence]
          properties:
            current:
              type: integer
              format: int64
              minimum: 0
            total:
              type: integer
              format: int64
              minimum: 0
            sequence:
              type: integer
              format: int64
              minimum: 1
        issueCode:
          type: string
          nullable: true
        queryPublicationId:
          allOf:
            - $ref: "#/components/schemas/QueryPublicationId"
          nullable: true
        retryOf:
          allOf:
            - $ref: "#/components/schemas/JobId"
          nullable: true
        attempt:
          type: integer
          minimum: 1
        createdAt:
          type: string
          format: date-time
        startedAt:
          type: string
          format: date-time
          nullable: true
        finishedAt:
          type: string
          format: date-time
          nullable: true
        updatedAt:
          type: string
          format: date-time
    QueryPublication:
      type: object
      additionalProperties: false
      required: [id, catalogRevision, overlayProjectionRevision, jobId, controlWatermark, createdAt]
      properties:
        id:
          $ref: "#/components/schemas/QueryPublicationId"
        catalogRevision:
          type: string
        overlayProjectionRevision:
          type: string
        jobId:
          $ref: "#/components/schemas/JobId"
        controlWatermark:
          type: integer
          format: int64
        createdAt:
          type: string
          format: date-time
    WorkOverlayPutRequest:
      type: object
      additionalProperties: false
      required: [titleOverride, manualTags, hidden, favorite, progress]
      properties:
        titleOverride:
          type: string
          maxLength: 4096
        manualTags:
          type: array
          maxItems: 200
          items: {type: string, minLength: 1, maxLength: 512}
        hidden:
          type: boolean
        customCoverMediaId:
          $ref: "#/components/schemas/CanonicalMediaId"
        favorite:
          type: boolean
        progress:
          type: number
          minimum: 0
          maximum: 1
    WorkOverlayState:
      type: object
      additionalProperties: false
      required: [workId, titleOverride, manualTags, hidden, favorite, progress, factWatermark,
        queryWatermark, projectedWatermark, projectionStatus]
      properties:
        workId:
          $ref: "#/components/schemas/CanonicalWorkId"
        titleOverride: {type: string}
        manualTags:
          type: array
          items: {type: string}
        hidden: {type: boolean}
        customCoverMediaId:
          $ref: "#/components/schemas/CanonicalMediaId"
        favorite: {type: boolean}
        progress: {type: number}
        factWatermark: {type: integer, format: int64, minimum: 0}
        queryWatermark: {type: integer, format: int64, minimum: 0}
        projectedWatermark: {type: integer, format: int64, minimum: 0}
        projectionStatus:
          type: string
          enum: [pending, published, failed]
        projectionJobId:
          $ref: "#/components/schemas/JobId"
        publishedQueryPublicationId:
          $ref: "#/components/schemas/QueryPublicationId"
        issueCode: {type: string}
    PublishedWork:
      type: object
      additionalProperties: false
      required: [id, title, creator, tags, mediaCount, queryPublicationId]
      properties:
        id:
          $ref: "#/components/schemas/CanonicalWorkId"
        title:
          type: string
        creator:
          type: string
        tags:
          type: array
          items: {type: string}
        mediaCount:
          type: integer
          minimum: 0
        queryPublicationId:
          $ref: "#/components/schemas/QueryPublicationId"
    WorkListResponse:
      type: object
      additionalProperties: false
      required: [queryPublicationId, catalogRevision, overlayProjectionRevision, sortProtocolVersion, works]
      properties:
        queryPublicationId:
          $ref: "#/components/schemas/QueryPublicationId"
        sortProtocolVersion:
          type: integer
          enum: [1]
        catalogRevision:
          type: string
        overlayProjectionRevision:
          type: string
        nextCursor:
          type: string
        works:
          type: array
          items:
            $ref: "#/components/schemas/PublishedWork"
    PublishedMedia:
      type: object
      additionalProperties: false
      required: [id, workId, kind, mimeType, sizeBytes, blob, available, ordinal, queryPublicationId]
      properties:
        id:
          $ref: "#/components/schemas/CanonicalMediaId"
        workId:
          $ref: "#/components/schemas/CanonicalWorkId"
        kind:
          type: string
        mimeType:
          type: string
        sizeBytes:
          type: integer
          format: int64
          minimum: 0
        blob:
          $ref: "#/components/schemas/ContentBlobRef"
        available:
          type: boolean
        ordinal:
          type: integer
          minimum: 0
        queryPublicationId:
          $ref: "#/components/schemas/QueryPublicationId"
    MediaListResponse:
      type: object
      additionalProperties: false
      required: [queryPublicationId, media]
      properties:
        queryPublicationId:
          $ref: "#/components/schemas/QueryPublicationId"
        media:
          type: array
          items:
            $ref: "#/components/schemas/PublishedMedia"
    Creator:
      type: object
      additionalProperties: false
      required: [id, name, effectiveId, sourceCount, createdAt]
      properties:
        id:
          $ref: "#/components/schemas/CanonicalCreatorId"
        name:
          type: string
        mergedInto:
          allOf:
            - $ref: "#/components/schemas/CanonicalCreatorId"
          nullable: true
        effectiveId:
          $ref: "#/components/schemas/CanonicalCreatorId"
        sourceCount:
          type: integer
          minimum: 0
        createdAt:
          type: string
          format: date-time
    CreatorSourceBinding:
      type: object
      additionalProperties: false
      required: [bindingId, sourceId, providerId, externalId, sourceKey, status]
      properties:
        bindingId:
          type: string
        sourceId:
          $ref: "#/components/schemas/SourceId"
        providerId:
          type: string
        externalId:
          type: string
        sourceKey:
          type: string
        status:
          type: string
          enum: [active, orphaned, manual_unbound, conflict]
    CreatorListResponse:
      type: object
      additionalProperties: false
      required: [creators]
      properties:
        creators:
          type: array
          items:
            $ref: "#/components/schemas/Creator"
    CreatorDetail:
      type: object
      additionalProperties: false
      required: [creator, sourceBindings]
      properties:
        creator:
          $ref: "#/components/schemas/Creator"
        sourceBindings:
          type: array
          items:
            $ref: "#/components/schemas/CreatorSourceBinding"
    CreatorMergeRequest:
      type: object
      additionalProperties: false
      required: [targetCreatorId, absorbedCreatorIds]
      properties:
        targetCreatorId:
          $ref: "#/components/schemas/CanonicalCreatorId"
        absorbedCreatorIds:
          type: array
          minItems: 1
          maxItems: 200
          items:
            $ref: "#/components/schemas/CanonicalCreatorId"
    CreatorMerge:
      type: object
      additionalProperties: false
      required: [id, targetCreatorId, absorbedCreatorIds, status, createdBy, createdAt]
      properties:
        id:
          $ref: "#/components/schemas/CreatorMergeId"
        targetCreatorId:
          $ref: "#/components/schemas/CanonicalCreatorId"
        absorbedCreatorIds:
          type: array
          items:
            $ref: "#/components/schemas/CanonicalCreatorId"
        status:
          type: string
          enum: [applied, undone]
        createdBy:
          type: string
        createdAt:
          type: string
          format: date-time
        undoneAt:
          type: string
          format: date-time
          nullable: true
        projectionJobId:
          allOf:
            - $ref: "#/components/schemas/JobId"
          nullable: true
    CreatorMergeListResponse:
      type: object
      additionalProperties: false
      required: [merges]
      properties:
        merges:
          type: array
          items:
            $ref: "#/components/schemas/CreatorMerge"
    BindingIssueCandidate:
      type: object
      additionalProperties: false
      required: [candidateId, candidateKind, matchSignal, matchValue, label]
      properties:
        candidateId:
          type: string
        candidateKind:
          type: string
          enum: [work, creator, media]
        matchSignal:
          type: string
        matchValue:
          type: string
        label:
          type: string
    BindingIssue:
      type: object
      additionalProperties: false
      required: [id, sourceId, entityType, sourceKey, code, candidateCount, status, version, createdAt, updatedAt, candidates]
      properties:
        id:
          $ref: "#/components/schemas/BindingIssueId"
        sourceId:
          $ref: "#/components/schemas/SourceId"
        entityType:
          type: string
          enum: [work, creator, media]
        sourceKey:
          type: string
        workSourceKey:
          type: string
        providerId:
          type: string
        externalId:
          type: string
        code:
          $ref: "#/components/schemas/ErrorCode"
        candidateCount:
          type: integer
          minimum: 0
        status:
          type: string
          enum: [open, resolved, dismissed, superseded, stale]
        resolution:
          type: string
          enum: [bind_existing, create_new, keep_separate, dismissed]
          nullable: true
        resolvedTargetId:
          type: string
          nullable: true
        resolvedBy:
          type: string
          nullable: true
        version:
          type: integer
          minimum: 1
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
        resolvedAt:
          type: string
          format: date-time
          nullable: true
        candidates:
          type: array
          items:
            $ref: "#/components/schemas/BindingIssueCandidate"
    BindingIssueListResponse:
      type: object
      additionalProperties: false
      required: [issues]
      properties:
        issues:
          type: array
          items:
            $ref: "#/components/schemas/BindingIssue"
        nextCursor:
          type: string
    LibraryCreateRequest:
      type: object
      additionalProperties: false
      required: [name]
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 256
    Library:
      type: object
      additionalProperties: false
      required: [id, name, createdAt]
      properties:
        id:
          $ref: "#/components/schemas/LibraryId"
        name:
          type: string
        createdAt:
          type: string
          format: date-time
    SourceCreateRequest:
      type: object
      additionalProperties: false
      required: [libraryId, displayName, rootPath]
      properties:
        libraryId:
          $ref: "#/components/schemas/LibraryId"
        displayName:
          type: string
          minLength: 1
          maxLength: 256
        rootPath:
          type: string
          minLength: 1
          maxLength: 32768
    Source:
      type: object
      additionalProperties: false
      required: [id, libraryId, displayName, readOnly, available, createdAt]
      properties:
        id:
          $ref: "#/components/schemas/SourceId"
        libraryId:
          $ref: "#/components/schemas/LibraryId"
        displayName:
          type: string
        readOnly:
          type: boolean
        available:
          type: boolean
        createdAt:
          type: string
          format: date-time
    RuleValidateRequest:
      type: object
      additionalProperties: false
      required: [package]
      properties:
        package: {type: object, additionalProperties: true}
    RuleValidationResult:
      type: object
      additionalProperties: false
      required: [canonicalPackage, packageHash, semanticHash]
      properties:
        canonicalPackage: {type: object, additionalProperties: true}
        packageHash: {$ref: "#/components/schemas/SHA256Digest"}
        semanticHash: {$ref: "#/components/schemas/SHA256Digest"}
    RuleCompileRequest:
      type: object
      additionalProperties: false
      required: [package, parameters]
      properties:
        package: {type: object, additionalProperties: true}
        parameters: {type: object, additionalProperties: true}
    RuleCompileResult:
      allOf:
        - $ref: "#/components/schemas/RuleValidationResult"
        - type: object
          additionalProperties: false
          required: [ruleIrHash, canonicalParameters, ruleIr, cacheHit]
          properties:
            ruleIrHash: {$ref: "#/components/schemas/SHA256Digest"}
            canonicalParameters: {type: object, additionalProperties: true}
            ruleIr: {type: object, additionalProperties: true}
            cacheHit: {type: boolean}
    RuleDryRunRequest:
      type: object
      additionalProperties: false
      required: [package, parameters, sample]
      properties:
        package: {type: object, additionalProperties: true}
        parameters: {type: object, additionalProperties: true}
        sample:
          $ref: "#/components/schemas/RuleDryRunSample"
    RuleDryRunSample:
      type: object
      additionalProperties: false
      required: [path, files, metadata]
      properties:
        path: {type: string, minLength: 1, maxLength: 4096}
        files:
          type: array
          maxItems: 10000
          items:
            type: object
            additionalProperties: false
            required: [path, size]
            properties:
              path: {type: string, minLength: 1, maxLength: 4096}
              size: {type: integer, minimum: 0}
              metadata: {}
        metadata: {}
    RuleDryRunResult:
      type: object
      additionalProperties: false
      required: [work, trace, issues]
      properties:
        work: {type: object, additionalProperties: true}
        trace:
          type: array
          items: {type: object, additionalProperties: true}
        issues:
          type: array
          items: {type: object, additionalProperties: true}
    RuleImpactRequest:
      type: object
      additionalProperties: false
      required: [before, after]
      properties:
        before: {type: object, additionalProperties: true}
        after: {type: object, additionalProperties: true}
    RuleImpactResult:
      type: object
      additionalProperties: false
      required: [fields, actions, fullRescan, reproject, rebuildSearch, rebuildDerived, bindingReview]
      properties:
        fields: {type: array, items: {type: string}, uniqueItems: true}
        actions: {type: array, items: {type: string}, uniqueItems: true}
        fullRescan: {type: boolean}
        reproject: {type: boolean}
        rebuildSearch: {type: boolean}
        rebuildDerived: {type: boolean}
        bindingReview: {type: boolean}
    RuleVersionCreateRequest:
      type: object
      additionalProperties: false
      required: [package]
      properties:
        package:
          type: object
          additionalProperties: true
    RuleVersion:
      type: object
      additionalProperties: false
      required: [ruleSetId, version, packageHash, semanticHash, ruleIrHash, createdAt]
      properties:
        ruleSetId:
          type: string
          pattern: "^rset_[0-9a-f]{8}-[0-9a-f]{4}-7[0-9a-f]{3}-[89ab][0-9a-f]{3}-[0-9a-f]{12}$"
        version:
          type: string
        packageHash:
          $ref: "#/components/schemas/SHA256Digest"
        semanticHash:
          $ref: "#/components/schemas/SHA256Digest"
        ruleIrHash:
          $ref: "#/components/schemas/SHA256Digest"
        createdAt:
          type: string
          format: date-time
    SourceRuleBindingCreateRequest:
      type: object
      additionalProperties: false
      required: [sourceId, semanticHash, parameters, priority]
      properties:
        sourceId:
          $ref: "#/components/schemas/SourceId"
        semanticHash:
          $ref: "#/components/schemas/SHA256Digest"
        parameters:
          type: object
          additionalProperties: true
        priority:
          type: integer
          minimum: 0
          maximum: 10000
    SourceRuleBinding:
      type: object
      additionalProperties: false
      required: [id, sourceId, semanticHash, parameters, priority, ruleIrHash, createdAt]
      properties:
        id:
          $ref: "#/components/schemas/SourceRuleBindingId"
        sourceId:
          $ref: "#/components/schemas/SourceId"
        semanticHash:
          $ref: "#/components/schemas/SHA256Digest"
        parameters:
          type: object
          additionalProperties: true
        priority:
          type: integer
        ruleIrHash:
          $ref: "#/components/schemas/SHA256Digest"
        createdAt:
          type: string
          format: date-time
    SHA256Digest:
      type: string
      pattern: "^[0-9a-f]{64}$"
    PairingAttemptResponse:
      type: object
      additionalProperties: false
      required: [credential, expiresAt]
      properties:
        credential:
          type: string
          minLength: 32
          maxLength: 256
        expiresAt:
          type: string
          format: date-time
    PairingExchangeRequest:
      type: object
      additionalProperties: false
      required: [credential]
      properties:
        credential:
          type: string
          minLength: 32
          maxLength: 256
    SessionEstablishedResponse:
      type: object
      additionalProperties: false
      required: [session, csrfToken, effectiveCapabilities]
      properties:
        session:
          $ref: "#/components/schemas/SessionSummary"
        csrfToken:
          type: string
          minLength: 32
          maxLength: 256
        effectiveCapabilities:
          type: array
          items:
            type: string
    SessionSummary:
      type: object
      additionalProperties: false
      required: [id, principalId, createdAt, expiresAt, lastSeenAt, revoked]
      properties:
        id:
          $ref: "#/components/schemas/SessionId"
        principalId:
          type: string
          minLength: 1
          maxLength: 128
        createdAt:
          type: string
          format: date-time
        expiresAt:
          type: string
          format: date-time
        lastSeenAt:
          type: string
          format: date-time
        revoked:
          type: boolean
    SessionId:
      type: string
      pattern: "^ses_[0-9a-f]{8}-[0-9a-f]{4}-7[0-9a-f]{3}-[89ab][0-9a-f]{3}-[0-9a-f]{12}$"
    LibraryId:
      type: string
      pattern: "^lib_[0-9a-f]{8}-[0-9a-f]{4}-7[0-9a-f]{3}-[89ab][0-9a-f]{3}-[0-9a-f]{12}$"
    SourceId:
      type: string
      pattern: "^src_[0-9a-f]{8}-[0-9a-f]{4}-7[0-9a-f]{3}-[89ab][0-9a-f]{3}-[0-9a-f]{12}$"
    CanonicalWorkId:
      type: string
      pattern: "^wrk_[0-9a-f]{8}-[0-9a-f]{4}-7[0-9a-f]{3}-[89ab][0-9a-f]{3}-[0-9a-f]{12}$"
    CanonicalCreatorId:
      type: string
      pattern: "^ctr_[0-9a-f]{8}-[0-9a-f]{4}-7[0-9a-f]{3}-[89ab][0-9a-f]{3}-[0-9a-f]{12}$"
    CanonicalMediaId:
      type: string
      pattern: "^med_[0-9a-f]{8}-[0-9a-f]{4}-7[0-9a-f]{3}-[89ab][0-9a-f]{3}-[0-9a-f]{12}$"
    SourceRuleBindingId:
      type: string
      pattern: "^srb_[0-9a-f]{8}-[0-9a-f]{4}-7[0-9a-f]{3}-[89ab][0-9a-f]{3}-[0-9a-f]{12}$"
    JobId:
      type: string
      pattern: "^job_[0-9a-f]{8}-[0-9a-f]{4}-7[0-9a-f]{3}-[89ab][0-9a-f]{3}-[0-9a-f]{12}$"
    QueryPublicationId:
      type: string
      pattern: "^qpub_[0-9a-f]{8}-[0-9a-f]{4}-7[0-9a-f]{3}-[89ab][0-9a-f]{3}-[0-9a-f]{12}$"
    CreatorMergeId:
      type: string
      pattern: "^cmrg_[0-9a-f]{8}-[0-9a-f]{4}-7[0-9a-f]{3}-[89ab][0-9a-f]{3}-[0-9a-f]{12}$"
    BindingIssueId:
      type: string
      pattern: "^biss_[0-9a-f]{8}-[0-9a-f]{4}-7[0-9a-f]{3}-[89ab][0-9a-f]{3}-[0-9a-f]{12}$"
    ContentBlobRef:
      type: object
      additionalProperties: false
      required: [algorithm, digest]
      properties:
        algorithm:
          type: string
          enum: [sha256-v1]
        digest:
          type: string
          pattern: "^[0-9a-f]{64}$"
    FileLocationRef:
      type: object
      additionalProperties: false
      required: [sourceId, identityVersion, locationKey]
      properties:
        sourceId:
          $ref: "#/components/schemas/SourceId"
        identityVersion:
          type: integer
          minimum: 1
          maximum: 65535
        locationKey:
          type: string
          minLength: 1
          maxLength: 4096
security:
  - sessionCookie: []
  - apiToken: []
