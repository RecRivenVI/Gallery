          description: 合并已撤销；projectionJobId 表明恢复投影进度
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreatorMerge"
        "401":
          $ref: "#/components/responses/UnauthenticatedError"
        "403":
          $ref: "#/components/responses/ForbiddenError"
        "404":
          $ref: "#/components/responses/NotFoundError"
        "409":
          $ref: "#/components/responses/ConflictError"
  /api/v1/binding-issues:
    get:
      operationId: listBindingIssues
      summary: 按 Source、实体类型和状态过滤并 keyset 分页列出 Binding issue
      parameters:
        - {name: sourceId, in: query, required: false, schema: {$ref: "#/components/schemas/SourceId"}}
        - {name: entityType, in: query, required: false, schema: {type: string, enum: [work, creator, media]}}
        - {name: status, in: query, required: false, schema: {type: string, enum: [open, resolved, dismissed, superseded, stale]}}
        - {name: cursor, in: query, required: false, schema: {type: string, maxLength: 4096}}
        - {name: limit, in: query, required: false, schema: {type: integer, minimum: 1, maximum: 200, default: 50}}
      responses:
        "200":
          description: Binding issue 列表
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BindingIssueListResponse"
        "400":
          $ref: "#/components/responses/ValidationError"
        "401":
          $ref: "#/components/responses/UnauthenticatedError"
        "403":
          $ref: "#/components/responses/ForbiddenError"
  /api/v1/binding-issues/{issueId}:
    get:
      operationId: getBindingIssue
      summary: 读取单个 Binding issue 及其候选证据
      parameters:
        - name: issueId
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/BindingIssueId"
      responses:
        "200":
          description: Binding issue 与候选证据
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BindingIssue"
        "401":
          $ref: "#/components/responses/UnauthenticatedError"
        "403":
          $ref: "#/components/responses/ForbiddenError"
        "404":
          $ref: "#/components/responses/NotFoundError"
  /api/v1/binding-issues/{issueId}/resolve:
    post:
      operationId: resolveBindingIssue
      summary: 人工修复 Binding issue（绑定候选或创建新实体），下一次扫描据此重建
      parameters:
        - name: issueId
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/BindingIssueId"
        - $ref: "#/components/parameters/CSRFHeader"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BindingIssueResolveRequest"
      responses:
        "200":
          description: 修复已记录
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BindingIssue"
        "400":
          $ref: "#/components/responses/ValidationError"
        "401":
          $ref: "#/components/responses/UnauthenticatedError"
        "403":
          $ref: "#/components/responses/ForbiddenError"
        "404":
          $ref: "#/components/responses/NotFoundError"
        "409":
          $ref: "#/components/responses/ConflictError"
  /api/v1/binding-issues/{issueId}/dismiss:
    post:
      operationId: dismissBindingIssue
      summary: 忽略/延后 Binding issue，抑制相同证据重复产生
      parameters:
